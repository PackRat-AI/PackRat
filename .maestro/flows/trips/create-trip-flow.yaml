appId: com.andrewbierman.packrat
---
# Create Trip Flow: Navigate to trips tab and create a new trip
- waitForAnimationToEnd

# Navigate to the Trips tab
- tapOn:
    text: "Trips"

- waitForAnimationToEnd

# Tap the header "+" button (testID: create-trip-button) to open the trip creation form
- tapOn:
    id: "create-trip-button"

- waitForAnimationToEnd

# Fill in the Trip Name field
- tapOn:
    text: "Trip Name"
- typeText: ${TRIP_NAME}

# Fill in the Description field
- tapOn:
    text: "Description"
- typeText: "Created by Maestro E2E test"

# Submit the form via the submit button (testID: submit-trip-button)
- tapOn:
    id: "submit-trip-button"

- waitForAnimationToEnd

# Verify we've returned to the trips list (form submit button should no longer be visible)
- assertNotVisible:
    id: "submit-trip-button"

# Assert the trip was created successfully
- assertVisible:
    text: ${TRIP_NAME}
