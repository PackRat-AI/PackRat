appId: ${APP_ID}
---
# Create Trip Flow
- waitForAnimationToEnd
- tapOn:
    text: "Trips"
- waitForAnimationToEnd
- tapOn:
    id: "create-trip-button"
- waitForAnimationToEnd
- tapOn:
    text: "Trip Name"
- inputText: ${TRIP_NAME}
- tapOn:
    text: "Description"
- inputText: "Created by Maestro E2E test"
# Tap neutral area to dismiss keyboard on iOS multiline field
- tapOn:
    text: "TRIP DETAILS"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# --- Start Date ---
- tapOn:
    id: "start-date-input"
- waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - repeat:
          times: ${START_TAPS}
          commands:
            - tapOn:
                text: "Next Month"
      - tapOn:
          text: "${START_DAY} ${START_MONTH} ${START_YEAR}"
      - tapOn:
          text: "OK"
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "${TODAY_DATE}"
      - waitForAnimationToEnd
      - tapOn:
          text: "${START_DAY}"
      - waitForAnimationToEnd
      - tapOn:
          point: "50%,90%"
- waitForAnimationToEnd

# --- End Date ---
- tapOn:
    id: "end-date-input"
- waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - repeat:
          times: ${END_TAPS}
          commands:
            - tapOn:
                text: "Next Month"
      - tapOn:
          text: "${END_DAY} ${END_MONTH} ${END_YEAR}"
      - tapOn:
          text: "OK"
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "${TODAY_DATE}"
      - waitForAnimationToEnd
      - tapOn:
          text: "${END_DAY}"
      - waitForAnimationToEnd
      - tapOn:
          point: "50%,90%"
- waitForAnimationToEnd

# --- Submit ---
- tapOn:
    id: "submit-trip-button"

- waitForAnimationToEnd

# Wait until the submit button disappears, confirming navigation away from the form
- extendedWaitUntil:
    notVisible:
      id: "submit-trip-button"
    timeout: 15000

# Assert we are back on the trips list (not still on the form) by checking
# for the header create button, then verify the new trip appears
- assertVisible:
    id: "create-trip-button"
- scrollUntilVisible:
    element:
      id: "trip-row-${TRIP_NAME}"
    direction: DOWN
    timeout: 60000
    speed: 99
- assertVisible:
      id: "trip-row-${TRIP_NAME}"

