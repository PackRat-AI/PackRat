appId: ${APP_ID}
---
# Create Trip Flow
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Trip Details"
    commands:
      - back
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "submit-trip-button"
    commands:
      - back
      - waitForAnimationToEnd
- tapOn:
    text: "Trips"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "create-trip-empty-button"
    commands:
      - tapOn:
          text: "create-trip-empty-button"
- runFlow:
    when:
      visible:
        id: "create-trip-button"
    commands:
      - tapOn:
          id: "create-trip-button"
- waitForAnimationToEnd
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "trips:name-input"
      - inputText: ${TRIP_NAME}
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "trips:name-input"
      - inputText: ${TRIP_NAME}

- assertVisible:
    text: ${TRIP_NAME}

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "trips:description-input"
      - inputText: "Created by Maestro E2E test"
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "trips:description-input"
      - inputText: "Created by Maestro E2E test"
# Tap neutral area to dismiss keyboard on iOS multiline field
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "TRIP DETAILS"
      - waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

# --- Start Date ---
- tapOn:
    id: "trips:start-date-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - repeat:
          times: ${START_TAPS}
          commands:
            - tapOn:
                text: "Next Month"
      - tapOn:
          text: "${START_DAY} ${START_MONTH} ${START_YEAR}"
      - tapOn:
          text: "OK"
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "${TODAY_DATE}"
      - waitForAnimationToEnd
      - tapOn:
          text: "${START_DAY}"
      - waitForAnimationToEnd
      - tapOn:
          point: "50%,90%"
- waitForAnimationToEnd

# --- End Date ---
- tapOn:
    id: "trips:end-date-btn"
- waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - repeat:
          times: ${END_TAPS}
          commands:
            - tapOn:
                text: "Next Month"
      - tapOn:
          text: "${END_DAY} ${END_MONTH} ${END_YEAR}"
      - tapOn:
          text: "OK"
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "${TODAY_DATE}"
      - waitForAnimationToEnd
      - tapOn:
          text: "${END_DAY}"
      - waitForAnimationToEnd
      - tapOn:
          point: "50%,90%"
- waitForAnimationToEnd

# --- Submit ---
- tapOn:
    id: "submit-trip-button"

- waitForAnimationToEnd

# Wait until the submit button disappears, confirming navigation away from the form
- extendedWaitUntil:
    notVisible:
      id: "submit-trip-button"
    timeout: 15000
- runFlow:
    when:
      visible:
        text: "Trip Details"
    commands:
      - assertVisible:
          text: ${TRIP_NAME}
      - back
      - waitForAnimationToEnd

# Assert we are back on the trips list (not still on the form) by checking
# for the header create button, then verify the new trip appears
- extendedWaitUntil:
    visible:
      id: "create-trip-button"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "trips:list-item-${TRIP_NAME}"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "trips:list-item-${TRIP_NAME}"
