appId: ${APP_ID}
---
# Create Trip Flow: Navigate to trips tab and create a new trip
- waitForAnimationToEnd

# Navigate to the Trips tab
- tapOn:
    text: "Trips"

- waitForAnimationToEnd

# Tap the header "+" button (testID: create-trip-button) to open the trip creation form
- tapOn:
    id: "create-trip-button"

- waitForAnimationToEnd

# Fill in the Trip Name field
- tapOn:
    id: "trip-name-input"
- inputText: ${TRIP_NAME}

# Fill in the Description field
- tapOn:
    id: "trip-description-input"
- inputText: "Created by Maestro E2E test"

# Dismiss the keyboard before interacting with the date picker rows.
# Android: hideKeyboard keeps focus off the description so the submit button
#   stays visible after the date pickers close.
# iOS: hideKeyboard fails on multiline TextInput (no toolbar "Done" button).
#   Tap in the navigation bar title area instead — this blurs the description
#   input and dismisses the keyboard without triggering any navigation action.
#   Once the keyboard is gone the date rows are accessible to Maestro.
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          point: "50%,8%"
      - waitForAnimationToEnd

# --- Start Date ---
# Use testID so the row is findable by XCTest accessibilityIdentifier even
# when the keyboard is still visible (text-based lookup fails when keyboard
# partially obscures the row on iOS).
- tapOn:
    id: "start-date-row"
- waitForAnimationToEnd

- repeat:
    times: ${START_TAPS}
    commands:
      - tapOn: "Next Month"

- runFlow:
    when:
      platform: Android
    commands:
      # Android calendar shows bare day numbers; tap the day digit directly
      - tapOn: "${START_DAY}"
      - tapOn: "OK"

- runFlow:
    when:
      platform: iOS
    commands:
      # Inline calendar (display="inline") exposes day cells as bare numbers.
      # Use anchored regex ^N$ so "4" matches only day 4, not "14" or "24".
      - tapOn: "^${START_DAY}$"
      - tapOn:
          point: "5%,5%"

- waitForAnimationToEnd

# --- End Date ---
- tapOn:
    id: "end-date-row"
- waitForAnimationToEnd

- repeat:
    times: ${END_TAPS}
    commands:
      - tapOn: "Next Month"

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: "${END_DAY}"
      - tapOn: "OK"

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: "^${END_DAY}$"
      - tapOn:
          point: "5%,5%"

- waitForAnimationToEnd

# --- Submit ---
- tapOn:
    id: "submit-trip-button"

- waitForAnimationToEnd

# Wait until the submit button disappears, confirming navigation away from the form
- extendedWaitUntil:
    notVisible:
      id: "submit-trip-button"
    timeout: 15000

# Assert we are back on the trips list (not still on the form) by checking
# for the header create button, then verify the new trip appears
- assertVisible:
    id: "create-trip-button"

# iOS: the "Save Password?" keychain prompt can appear late — after returning
# from any form with a password field. Dismiss it before scrolling so it
# doesn't intercept taps or obscure the list.
- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          when:
            visible:
              text: "Not Now"
          commands:
            - tapOn:
                text: "Not Now"
            - waitForAnimationToEnd

# Verify the new trip is in the list.
# Android: scrollUntilVisible works correctly.
- runFlow:
    when:
      platform: Android
    commands:
      - waitForAnimationToEnd
      - scrollUntilVisible:
          element:
            text: ${TRIP_NAME}
          direction: DOWN
          timeout: 30000
          speed: 40
      - assertVisible:
          text: ${TRIP_NAME}

# iOS: scrollUntilVisible cannot reliably detect FlatList items through the LargeTitleHeader
# accessibility tree even when the item is visually present. Use the native search bar instead
# to filter to the new trip, then verify a result row appears.
# assertVisible by text fails on iOS because Pressable accessible={true} absorbs child Text
# nodes — the Text is not separately accessible. Check by testID instead.
- runFlow:
    when:
      platform: iOS
    commands:
      - waitForAnimationToEnd
      - tapOn:
          text: "Search trips..."
      - waitForAnimationToEnd
      - inputText: ${TRIP_NAME}
      - extendedWaitUntil:
          visible:
            id: "trip-search-result"
          timeout: 30000
      - tapOn:
          text: "Trips"
      - waitForAnimationToEnd

