appId: ${APP_ID}
---
# Trip Edit Flow: Tests trip detail view and verifies edit elements exist
# Note: Edit button is an icon without text/testID, so we verify trip detail content
# and the presence of action icons rather than tapping through to edit form
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Trips"
    timeout: 30000

# Navigate to Trips tab
- tapOn:
    text: "Trips"
- waitForAnimationToEnd

# Tap into the trip created earlier in this run
- scrollUntilVisible:
    element:
      id: "trips:list-item-${TRIP_NAME}"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "trips:list-item-${TRIP_NAME}"
- waitForAnimationToEnd

# Assert trip detail loaded with all expected content
- assertVisible:
    text: "Trip Details"
- assertVisible:
    text: ${TRIP_NAME}
- assertVisible:
    text: "Dates"
- assertVisible:
    text: "Start Date"
- assertVisible:
    text: "End Date"
- assertVisible:
    text: "Details"

# Verify the trip description is shown
- assertVisible:
    text: ".*Maestro E2E.*"
- assertVisible:
    id: "trips:edit"
- assertVisible:
    id: "trips:delete"

# Open the edit form from the header action and verify the existing trip loads.
- tapOn:
    id: "trips:edit"
- waitForAnimationToEnd
- assertVisible:
    id: "trips:name-input"
- assertVisible:
    text: ${TRIP_NAME}
- back
- waitForAnimationToEnd

# Go back to trips list
- back
- waitForAnimationToEnd
