appId: ${APP_ID}
---
# Trip Detail Flow: Navigate to a trip and verify detail screen
- waitForAnimationToEnd

# Navigate to Trips tab
- tapOn:
    text: "Trips"
- waitForAnimationToEnd

# Tap the test trip
- tapOn:
    text: ${TRIP_NAME}
- waitForAnimationToEnd

# Verify trip name is shown
- assertVisible:
    text: ${TRIP_NAME}

# Go back to trips list
# iOS: hardware back is unreliable from a root-stack screen with NativeTabs as parent.
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          start: "2%,50%"
          end: "80%,50%"
          duration: 500
      - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
