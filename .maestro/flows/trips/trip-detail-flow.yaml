appId: ${APP_ID}
---
# Trip Detail Flow: Navigate to a trip and verify detail screen
- waitForAnimationToEnd

# Navigate to Trips tab
- tapOn:
    text: "Trips"
- waitForAnimationToEnd

# Tap the trip created earlier in this run
- scrollUntilVisible:
    element:
      id: "trips:list-item-${TRIP_NAME}"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "trips:list-item-${TRIP_NAME}"
- waitForAnimationToEnd

# Verify trip name is shown
- assertVisible:
    text: ${TRIP_NAME}

# Go back to trips list - platform specific
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: ".*Back.*"
- waitForAnimationToEnd
