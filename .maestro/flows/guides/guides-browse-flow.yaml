appId: ${APP_ID}
---
# Guides Browse Flow: Tests the guides content section
- launchApp
- waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          when:
            visible:
              text: "Software update"
          commands:
            - back
            - waitForAnimationToEnd
            - launchApp
      - runFlow:
          when:
            visible:
              text: "Update ready to install"
          commands:
            - back
            - waitForAnimationToEnd
            - launchApp
- extendedWaitUntil:
    visible:
      text: "Dashboard"
    timeout: 15000

# Navigate to Dashboard
- tapOn:
    text: "Dashboard"
- waitForAnimationToEnd

# Scroll to find the Guides tile
- scrollUntilVisible:
    element:
      text: "Guides"
    direction: DOWN

# Tap the Guides tile
- tapOn:
    text: "Guides"
- waitForAnimationToEnd

# The API may have seeded guide content, an empty dataset, or a category load error.
# Validate the real state, and still exercise guide details when content exists.
- runFlow:
    when:
      visible:
        text: "Failed to load categories"
    commands:
      - assertVisible:
          text: "Retry"

- runFlow:
    when:
      visible:
        text: "No guides available"
    commands:
      - assertVisible:
          text: "No guides available"

- runFlow:
    when:
      visible:
        id: "guides:card-.*"
    commands:
      - assertVisible:
          id: "guides:card-.*"
      - tapOn:
          id: "guides:card-.*"
          index: 0
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "Failed to load guide"
          commands:
            - assertVisible:
                text: "Failed to load guide"
      - runFlow:
          when:
            visible:
              text: ".*min read.*"
          commands:
            - assertVisible:
                text: ".*min read.*"
      - runFlow:
          when:
            platform: Android
          commands:
            - tapOn:
                point: "8%,7%"
      - runFlow:
          when:
            platform: iOS
          commands:
            - tapOn:
                text: ".*Back.*"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            text: "All"
          timeout: 10000

- runFlow:
    when:
      visible:
        text: "All"
    commands:
      - tapOn:
          text: "All"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Activity Specific"
    commands:
      - tapOn:
          text: "Activity Specific"
      - waitForAnimationToEnd
      - tapOn:
          text: "All"
      - waitForAnimationToEnd

# Go back to dashboard
- back
- waitForAnimationToEnd

# Verify we returned to Dashboard
- assertVisible:
    text: "Dashboard"
