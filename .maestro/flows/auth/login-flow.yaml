appId: ${APP_ID}
---
# Login Flow: Navigate to auth screen and sign in with email and password
- launchApp

# Dismiss Android ANR dialog that can appear during emulator boot before first interaction
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          when:
            visible:
              text: "isn't responding"
          commands:
            - tapOn:
                text: "Wait"
            - waitForAnimationToEnd

# Wait for the auth entry screen — ensures sign-in button is rendered before tapping
- extendedWaitUntil:
    visible:
      id: "sign-in-email-button"
    timeout: 15000

# Tap the "Sign In" (email) button to navigate to the email login screen
- tapOn:
    id: "sign-in-email-button"

# Wait for login form to appear.
# auth/(login) is presented as a modal; waitForAnimationToEnd alone is not
# sufficient — the XCTest accessibility tree may not include the modal until
# the presentation animation fully settles. extendedWaitUntil polls until
# the field is accessible, giving the modal time to fully render.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "Email"
          timeout: 20000
- waitForAnimationToEnd

# Fill in the email field.
# iOS: NativeWindUI's TextField inside accessible={false} FormSection doesn't expose
#      testID to Maestro's XCTest snapshot, so we match the placeholder text instead.
# Android: testID maps reliably to resource-id.
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Email"
      - inputText: "${TEST_EMAIL}"
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "email-input"
      - inputText: "${TEST_EMAIL}"

# Fill in the password field
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Password"
      - inputText: ${TEST_PASSWORD}
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "password-input"
      - inputText: ${TEST_PASSWORD}

# Dismiss the keyboard before submitting
- hideKeyboard

# Submit login form via the continue button
- tapOn:
    id: "continue-button"

# Wait for navigation to complete — login can take a few seconds
- waitForAnimationToEnd

# Handle transient network error: if the API call failed (e.g. "Network request
# failed" dialog), dismiss the alert and retry once with the same credentials.
- runFlow:
    when:
      visible:
        text: "Network request failed"
    commands:
      - tapOn:
          text: "OK"
      - waitForAnimationToEnd
      - tapOn:
          id: "continue-button"
      - waitForAnimationToEnd

# iOS only: dismiss the system "Save Password?" Keychain prompt that appears
# after submitting any form with a password field (textContentType="password").
# This prompt is a blocking OS-level dialog and would intercept subsequent taps
# if not handled. Real users can choose to save — in CI we always skip it.
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Not Now"
          optional: true
          label: "Dismiss iOS Save Password prompt"

# Wait for the main tab bar to appear — confirms we are logged in and on the main app.
# We only assert the tab bar is visible here; navigation to specific tabs is left to
# subsequent flows (dashboard-tiles-flow taps Packs, providing a stable entry point for
# create-pack-flow). Navigating to Packs directly after login is unreliable on iOS
# because Expo Router's post-login routing is still settling at this point.
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Packs"
    timeout: 20000
