appId: com.packratai.mobile
---
# Login Flow: Launch app and sign in with email/password
# Handles both fresh launch (needs login) and already-logged-in states
- launchApp
- waitForAnimationToEnd

# Check if already logged in (Dashboard visible = already authenticated)
- runFlow:
    when:
      visible:
        text: "Dashboard"
    commands:
      - assertVisible:
          text: "Dashboard"

# If not logged in, proceed with authentication
- runFlow:
    when:
      notVisible:
        text: "Dashboard"
    commands:
      # Wait for auth screen
      - extendedWaitUntil:
          visible:
            text: "Sign In"
          timeout: 10000

      - tapOn:
          text: "Sign In"
      - waitForAnimationToEnd

      # May need a second tap if on splash screen
      - runFlow:
          when:
            notVisible:
              text: "Email"
          commands:
            - tapOn:
                text: "Sign In"
            - waitForAnimationToEnd

      # Fill credentials
      - assertVisible:
          text: "Email"

      - tapOn:
          text: "Email"
      - inputText: ${TEST_EMAIL}

      - tapOn:
          text: "Password"
      - inputText: ${TEST_PASSWORD}

      - hideKeyboard

      - tapOn:
          text: "Submit"

      # Wait for login to complete
      - extendedWaitUntil:
          visible:
            text: "Dashboard"
          timeout: 20000

# Final assertion — should be on Dashboard either way
- assertVisible:
    text: "Dashboard"
- assertVisible:
    text: "Packs"
- assertVisible:
    text: "Trips"
