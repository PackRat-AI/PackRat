appId: ${APP_ID}
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the log out button if needed
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN

# Tap Log Out
- tapOn:
    text: "Log Out"

- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - tapOn:
          text: "Proceed"

- waitForAnimationToEnd

# Handle post-logout dialog - choose to Sign-in again
- runFlow:
    when:
      visible:
        text: "Sign-in again"
    commands:
      - tapOn:
          text: "Sign-in again"

- waitForAnimationToEnd

# Assert we are back on the auth screen
- assertVisible:
    text: "Sign In"
