appId: com.packratai.mobile
---
# Logout Flow: Navigate to profile and sign out
# Note: After logout, app may stay on Dashboard (guest mode) or go to Sign In
- launchApp
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"
- waitForAnimationToEnd

# Assert profile loaded
- assertVisible:
    text: "Account Information"

# Scroll to Log Out button
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN

- tapOn:
    text: "Log Out"
- waitForAnimationToEnd

# Handle possible sync confirmation dialog
- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - tapOn:
          text: "Log Out"
          index: 1

- waitForAnimationToEnd

# Handle post-logout dialog
- runFlow:
    when:
      visible:
        text: "Stay logged out"
    commands:
      - tapOn:
          text: "Stay logged out"

- waitForAnimationToEnd

# After logout, app may show Sign In screen OR stay on Dashboard (guest mode)
# Either state is acceptable — verify we're on a known screen
- runFlow:
    when:
      visible:
        text: "Sign In"
    commands:
      - assertVisible:
          text: "Sign In"

- runFlow:
    when:
      visible:
        text: "Dashboard"
    commands:
      - assertVisible:
          text: "Dashboard"

# Re-login to restore session for subsequent test flows
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Sign In"
    timeout: 10000

- tapOn:
    text: "Sign In"
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Email"
    commands:
      - tapOn:
          text: "Sign In"
      - waitForAnimationToEnd

- tapOn:
    text: "Email"
- inputText: ${TEST_EMAIL}

- tapOn:
    text: "Password"
- inputText: ${TEST_PASSWORD}

- hideKeyboard

- tapOn:
    text: "Submit"

- extendedWaitUntil:
    visible:
      text: "Dashboard"
    timeout: 20000

- assertVisible:
    text: "Dashboard"
