appId: ${APP_ID}
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the sign-out button.
# iOS: use testID (id:) to avoid UITextView accessibilityValue issues with text-based matching.
# Android: use text: which works reliably (UITextView issue is iOS-only).
- runFlow:
    when:
      platform: iOS
    commands:
      - scrollUntilVisible:
          element:
            id: "sign-out-button"
          direction: DOWN
      - tapOn:
          id: "sign-out-button"
- runFlow:
    when:
      platform: Android
    commands:
      - scrollUntilVisible:
          element:
            text: "Log Out"
          direction: DOWN
      - tapOn:
          text: "Log Out"

- waitForAnimationToEnd

# Handle sync-conflict confirmation dialog if present (only appears when there are unsynced changes).
# Both platforms use native Alert.alert(). In XCTest, the UIAlertController action occupies
# index 0 for text "Log Out" (foreground alert window elements appear first); the profile
# list button is at index 1. Maestro log from run 25218877925 confirmed index:1 was tapping
# resource-id=sign-out-button (y=706, the list button) — wrong element. No index (=0) targets
# the alert action. waitForAnimationToEnd ensures the native alert is fully presented before tap.
- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - waitForAnimationToEnd
      - tapOn:
          text: "Log Out"

- waitForAnimationToEnd

# Handle post-logout dialog if it appears - choose to Sign-in again
- runFlow:
    when:
      visible:
        text: "Sign-in again"
    commands:
      - tapOn:
          text: "Sign-in again"

- waitForAnimationToEnd

# Assert we are back on the auth screen (allow up to 30s for app reload).
# iOS: use testID to avoid UITextView text-matching issues on the Sign In button.
# Android: use text: which works reliably.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            id: "sign-in-email-button"
          timeout: 30000
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            text: "Sign In"
          timeout: 30000
