appId: ${APP_ID}
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - tapOn:
          text: "LOG OUT|PROCEED"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "You're now logged out!"
    commands:
      - tapOn:
          text: "SIGN-IN AGAIN|Sign-in again"
      - waitForAnimationToEnd

# Navigate to the Profile tab
- runFlow:
    when:
      visible:
        text: "Profile"
    commands:
      - tapOn:
          text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the log out button if needed
- runFlow:
    when:
      visible:
        text: "Profile"
    commands:
      - scrollUntilVisible:
          element:
            text: "Log Out"
          direction: DOWN

# Tap Log Out
- runFlow:
    when:
      visible:
        text: "Log Out"
    commands:
      - tapOn:
          text: "Log Out"

- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - tapOn:
          text: "LOG OUT|PROCEED"

- waitForAnimationToEnd

# Handle post-logout dialog - choose to Sign-in again
- runFlow:
    when:
      visible:
        text: "You're now logged out!"
    commands:
      - tapOn:
          text: "SIGN-IN AGAIN|Sign-in again"

- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "http://.*"
    commands:
      - tapOn:
          text: "http://.*"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Runtime version:.*"
    commands:
      - tapOn:
          text: "Close"
      - waitForAnimationToEnd

# Assert we are back on the auth screen.
- extendedWaitUntil:
    visible:
      id: "sign-in-email-button"
    timeout: 15000
