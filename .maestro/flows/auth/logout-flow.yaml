appId: ${APP_ID}
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the log out button if needed
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN

# Tap Log Out
- tapOn:
    text: "Log Out"

- waitForAnimationToEnd

# Handle sync-conflict confirmation dialog if present (only appears when there are unsynced changes)
# On Android this is now a native Alert.alert() dialog — just tap by text with no index needed.
- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - tapOn:
          text: "Log Out"

- waitForAnimationToEnd

# Handle post-logout dialog if it appears - choose to Sign-in again
- runFlow:
    when:
      visible:
        text: "Sign-in again"
    commands:
      - tapOn:
          text: "Sign-in again"

- waitForAnimationToEnd

# Assert we are back on the auth screen (allow up to 30s for app reload)
- extendedWaitUntil:
    visible:
      text: "Sign In"
    timeout: 30000
