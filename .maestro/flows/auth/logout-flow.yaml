appId: com.andrewbierman.packrat
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the log out button if needed
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN

# Tap Log Out
- tapOn:
    text: "Log Out"

- waitForAnimationToEnd

# Confirm logout in dialog if present (tap "Stay logged out" / "Log Out" confirmation)
- runFlow:
    when:
      visible:
        text: "Log Out"
    commands:
      - tapOn:
          text: "Log Out"

- waitForAnimationToEnd

# Assert we are back on the auth screen
- assertVisible:
    text: "Sign In"
