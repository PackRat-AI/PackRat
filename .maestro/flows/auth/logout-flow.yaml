appId: ${APP_ID}
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the sign-out button via testID.
# Using id: instead of text: avoids UITextView accessibilityValue issues on iOS.
- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN

# Tap sign-out button
- tapOn:
    id: "sign-out-button"

- waitForAnimationToEnd

# Handle sync-conflict confirmation dialog if present (only appears when there are unsynced changes).
# On Android this is a native Alert.alert() dialog — tap by text with no index needed.
# On iOS this is a custom AlertComponent dialog — also tap by text.
- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - tapOn:
          text: "Log Out"

- waitForAnimationToEnd

# Handle post-logout dialog if it appears - choose to Sign-in again
- runFlow:
    when:
      visible:
        text: "Sign-in again"
    commands:
      - tapOn:
          text: "Sign-in again"

- waitForAnimationToEnd

# Assert we are back on the auth screen (allow up to 30s for app reload).
# Use the sign-in-email-button testID to avoid UITextView text-matching issues on iOS.
- extendedWaitUntil:
    visible:
      id: "sign-in-email-button"
    timeout: 30000
