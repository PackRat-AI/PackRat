appId: ${APP_ID}
---
# Logout Flow: Navigate to profile and sign out
- waitForAnimationToEnd

# Navigate to the Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

# Scroll down to find the log out button if needed
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN

# Tap Log Out
- tapOn:
    text: "Log Out"

- waitForAnimationToEnd

# Handle sync-conflict confirmation dialog if present (only appears when there are unsynced changes).
# The AlertComponent renders via a portal AFTER the profile button in the DOM tree, so the modal's
# "Log Out" button is at index 1 (index 0 is the background profile button).
- runFlow:
    when:
      visible:
        text: "Sync in progress"
    commands:
      - waitForAnimationToEnd
      - tapOn:
          text: "Log Out"
          index: 1

- waitForAnimationToEnd

# Handle post-logout dialog if it appears - choose to Sign-in again
- runFlow:
    when:
      visible:
        text: "Sign-in again"
    commands:
      - tapOn:
          text: "Sign-in again"

- waitForAnimationToEnd

# Assert we are back on the auth screen (allow up to 30s for app reload)
- extendedWaitUntil:
    visible:
      text: "Sign In"
    timeout: 30000
