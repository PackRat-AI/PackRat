appId: ${APP_ID}
---
# Session Persistence Flow: Tests that login persists after app restart.
# Must run after login-flow.yaml. `launchApp` force-relaunches the app without
# clearing state, which validates the persisted Better Auth session.
- launchApp
- runFlow:
    when:
      visible:
        text: "http://.*"
    commands:
      - tapOn:
          text: "http://.*"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Runtime version:.*"
    commands:
      - tapOn:
          text: "Close"
      - waitForAnimationToEnd
- waitForAnimationToEnd

# After relaunch, app should NOT show login screen.
- extendedWaitUntil:
    visible:
      text: "Packs"
    timeout: 35000

# Verify bottom nav tabs are visible (confirms logged-in state)
- assertVisible:
    text: "Packs"
- assertVisible:
    text: "Trips"
- assertVisible:
    text: "Catalog"
- assertVisible:
    text: "Profile"
