appId: ${APP_ID}
---
# Clear app state before running tests to ensure a clean environment
- launchApp:
    clearState: true
    stopApp: true

# Dismiss Android ANR dialog that can appear during emulator boot
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          when:
            visible:
              text: "isn't responding"
          commands:
            - tapOn:
                text: "Wait"
            - waitForAnimationToEnd
