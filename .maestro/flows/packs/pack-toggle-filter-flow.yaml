appId: ${APP_ID}
---
# Pack Toggle & Filter Flow: Tests My Packs/All Packs toggle and category filters
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Packs"
    timeout: 30000

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Assert My Packs / All Packs toggle exists
- assertVisible:
    text: "My Packs"
- assertVisible:
    text: "All Packs"

# Verify category filters
- assertVisible:
    text: "All"
- assertVisible:
    text: "Hiking"

# Switch to All Packs
- tapOn:
    text: "All Packs"
- waitForAnimationToEnd

# The community list is data-dependent; asserting the toggle settles is enough
# to cover the control without coupling this suite to seeded pack names.
- assertVisible:
    text: "All Packs"

# Switch back to My Packs
- tapOn:
    text: "My Packs"
- waitForAnimationToEnd

# Test category filter — tap Hiking
- tapOn:
    text: "Hiking"
- waitForAnimationToEnd

# Tap All to reset filter
- tapOn:
    text: "All"
- waitForAnimationToEnd

# Verify the pack created earlier in this run is still visible
- scrollUntilVisible:
    element:
      id: "packs:list-item-${PACK_NAME}"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "packs:list-item-${PACK_NAME}"
