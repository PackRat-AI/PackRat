appId: ${APP_ID}
---
# Add Item via In-Pack Catalog Flow: Tests BUG-7 — in-pack catalog add doesn't persist
# Different from add-item-catalog-flow.yaml which uses the main Catalog tab
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Packs"
    timeout: 30000

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap into the pack created earlier in this run
- scrollUntilVisible:
    element:
      id: "packs:list-item-${PACK_NAME}"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "packs:list-item-${PACK_NAME}"
- waitForAnimationToEnd

# Assert pack detail loaded
- assertVisible:
    text: "Pack Details"

# Tap Add Item
- tapOn:
    id: "add-item-button"
- waitForAnimationToEnd

# Assert bottom sheet with options
- assertVisible:
    id: "add-manually-option"
- assertVisible:
    id: "add-from-catalog-option"

# Select Add from Catalog (within pack context)
- tapOn:
    id: "add-from-catalog-option"
- waitForAnimationToEnd

# Wait for the in-pack catalog browser to load
- extendedWaitUntil:
    visible:
      text: "Browse Catalog"
    timeout: 10000

# Verify catalog items are shown
- extendedWaitUntil:
    visible:
      text: "All"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "catalog-item-card-.*"
    timeout: 30000

# Tap a catalog item to toggle it
- scrollUntilVisible:
    element:
      id: "catalog-item-card-.*"
    direction: DOWN

- tapOn:
    id: "catalog-item-card-.*"
    index: 0
- waitForAnimationToEnd

# BUG-7: The item's icon changes (visual toggle) but doesn't persist
# Go back to pack detail
- back
- waitForAnimationToEnd

# Go back to packs list
- back
- waitForAnimationToEnd
