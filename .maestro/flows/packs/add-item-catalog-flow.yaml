appId: ${APP_ID}
---
# Add Item from Catalog Flow: Tests adding an item to a pack via catalog detail
# This path works (unlike Add Manually) — verifies the working add-to-pack flow
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Catalog"
    timeout: 30000

# Navigate to Catalog tab
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd

# Assert catalog loaded with items
- assertVisible:
    text: "Catalog"
- runFlow:
    when:
      visible:
        text: "Error loading items"
    commands:
      - assertVisible:
          text: "Retry"

# The catalog depends on seeded backend data. When it is available, exercise the
# full add-to-pack path; otherwise the error-state assertion above covers the
# screen without failing unrelated pack flows.
- runFlow:
    when:
      visible:
        id: "catalog:item-.*"
    commands:
      - tapOn:
          id: "catalog:item-.*"
          index: 0
      - waitForAnimationToEnd

      # Assert item detail loaded
      - assertVisible:
          text: "Item Details"

      # Scroll to Add to Pack button
      - scrollUntilVisible:
          element:
            text: "Add to Pack"
          direction: DOWN

      # Tap "Add to Pack"
      - tapOn:
          text: "Add to Pack"
      - waitForAnimationToEnd

      # Assert pack picker shows packs
      - assertVisible:
          text: "ADDING"

      # Filter the picker to the pack created earlier in this run. The picker
      # list can contain stale E2E packs from prior runs, and nested scrolling is
      # unreliable on Android physical devices.
      - tapOn:
          text: "Search.*"
      - inputText: "${PACK_NAME}"
      - hideKeyboard
      - extendedWaitUntil:
          visible:
            id: "catalog:pack-option-${PACK_NAME}"
          timeout: 30000

      # Select the pack created earlier in this run
      - tapOn:
          id: "catalog:pack-option-${PACK_NAME}"
      - waitForAnimationToEnd

      # Assert we see the add-to-pack confirmation form
      - assertVisible:
          text: "Selected Pack"
      - assertVisible:
          text: ${PACK_NAME}
      - assertVisible:
          text: "Quantity"

      # Scroll to find the submit button
      - scrollUntilVisible:
          element:
            text: "Add to Pack"
          direction: DOWN

      # Tap the "Add to Pack" submit button
      - tapOn:
          id: "items:catalog-confirm-add"
      - waitForAnimationToEnd

      # Verify we returned to item detail and pack count increased
      - assertVisible:
          id: "add-to-pack-button"
      - runFlow:
          when:
            platform: Android
          commands:
            - back
      - runFlow:
          when:
            platform: iOS
          commands:
            - tapOn:
                text: ".*Back.*"
      - waitForAnimationToEnd
