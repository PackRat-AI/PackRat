appId: ${APP_ID}
---
# Pack Detail Flow: Navigate to a pack and verify detail screen elements
- waitForAnimationToEnd

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap the test pack.
# iOS: PackListScreen clears the search bar on blur, so search is not active when this
# flow starts. Re-activate search to filter to the pack, then tap the result row via
# testID to avoid hitting the UITextField (which contains the same text).
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Search..."
      - eraseText: 100  # clear any text left from a previous flow before typing
      - inputText: ${PACK_NAME}
      - tapOn:
          id: "pack-search-result"
      - waitForAnimationToEnd

# Android: search is not active; tap the pack card in the list.
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          text: ${PACK_NAME}
      - waitForAnimationToEnd

# Assert pack detail elements via testIDs
- assertVisible:
    id: "ask-ai-button"
- assertVisible:
    id: "add-item-button"
- assertVisible:
    id: "pack-more-actions"

# Verify pack name is displayed
- assertVisible:
    text: ${PACK_NAME}

# Go back to packs list
# iOS: XCTest synthetic swipes do not trigger UIScreenEdgePanGestureRecognizer.
# Tap the native navigation bar back button instead (accessibility label "Back").
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Back"
      - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
