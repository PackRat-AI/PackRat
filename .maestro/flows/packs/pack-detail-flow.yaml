appId: ${APP_ID}
---
# Pack Detail Flow: Navigate to a pack and verify detail screen elements
- waitForAnimationToEnd

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap the test pack.
# iOS: create-pack-flow leaves the search overlay active with ${PACK_NAME} typed. The pack
# name text appears in both the search bar text field and the result row, so tapOn: text
# would hit the text field. Use the pack-search-result testID to target the result row.
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "pack-search-result"
      - waitForAnimationToEnd

# Android: search is not active; tap the pack card in the list.
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          text: ${PACK_NAME}
      - waitForAnimationToEnd

# Assert pack detail elements via testIDs
- assertVisible:
    id: "ask-ai-button"
- assertVisible:
    id: "add-item-button"
- assertVisible:
    id: "pack-more-actions"

# Verify pack name is displayed
- assertVisible:
    text: ${PACK_NAME}

# Go back to packs list
- back
- waitForAnimationToEnd
