appId: ${APP_ID}
---
# Create Pack Flow: Navigate to packs tab and create a new pack
- waitForAnimationToEnd

# Navigate to the Packs tab and wait until the header create button is visible.
# Use extendedWaitUntil rather than a bare tap+wait to handle cases where the
# animation from the previous flow hasn't fully settled.
- tapOn:
    text: "Packs"
- extendedWaitUntil:
    visible:
      id: "create-pack-button"
    timeout: 10000

# Tap the header "+" button (testID: create-pack-button) to open the pack creation form
- tapOn:
    id: "create-pack-button"

- waitForAnimationToEnd

# Fill in Pack Name
# iOS: tap the container Pressable (pack-name-container) which is the
# accessibility leaf and focuses the inner TextInput on press.
# Android: match by placeholder text (no container wrapper needed).
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "pack-name-container"
      - waitForAnimationToEnd
      - inputText: ${PACK_NAME}
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "pack-name-input"
      - inputText: ${PACK_NAME}

# Fill in Description
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "newspaper, Description"
      - inputText: "Created by Maestro E2E test"
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "pack-description-input"
      - inputText: "Created by Maestro E2E test"

# Dismiss the keyboard before submitting
- hideKeyboard

# Submit the form via the submit button (testID: submit-pack-button)
- tapOn:
    id: "submit-pack-button"

- waitForAnimationToEnd

# Wait until the submit button disappears, confirming navigation away from the form
- extendedWaitUntil:
    notVisible:
      id: "submit-pack-button"
    timeout: 15000

# Assert the pack was created - we should see the pack name in the list/details
# Also confirm we are on the packs list by checking for the create button
- assertVisible:
    id: "create-pack-button"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "packs:list-item-${PACK_NAME}"
    direction: DOWN
    timeout: 30000
    speed: 40
- assertVisible:
    id: "packs:list-item-${PACK_NAME}"
