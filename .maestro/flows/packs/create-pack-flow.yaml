appId: ${APP_ID}
---
# Create Pack Flow: Navigate to packs tab and create a new pack
- waitForAnimationToEnd

# Navigate to the Packs tab
- tapOn:
    text: "Packs"

- waitForAnimationToEnd

# Tap the header "+" button (testID: create-pack-button) to open the pack creation form
- tapOn:
    id: "create-pack-button"

- waitForAnimationToEnd

# Fill in Pack Name
- tapOn:
    id: "pack-name-input"
- inputText: ${PACK_NAME}

# Fill in Description
- tapOn:
    id: "pack-description-input"
- inputText: "Created by Maestro E2E test"

# Dismiss the keyboard before submitting
- hideKeyboard

# Submit the form via the submit button (testID: submit-pack-button)
- tapOn:
    id: "submit-pack-button"

- waitForAnimationToEnd

# Wait until the submit button disappears, confirming navigation away from the form
- extendedWaitUntil:
    notVisible:
      id: "submit-pack-button"
    timeout: 15000

# Assert we are back on the packs list
- assertVisible:
    id: "create-pack-button"

# Wait for the list to refresh, then scroll to find the new pack.
# Both platforms accumulate old packs from previous runs, so the new pack
# may appear below the fold. speed:40 avoids scrolling past it.
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: ${PACK_NAME}
    direction: DOWN
    timeout: 60000
    speed: 40
- assertVisible:
    text: ${PACK_NAME}
