appId: ${APP_ID}
---
# Create Pack Flow: Navigate to packs tab and create a new pack
- waitForAnimationToEnd

# Navigate to the Packs tab
- tapOn:
    text: "Packs"

- waitForAnimationToEnd

# Tap the header "+" button (testID: create-pack-button) to open the pack creation form
- tapOn:
    id: "create-pack-button"

- waitForAnimationToEnd

# Fill in Pack Name
- tapOn:
    id: "pack-name-input"
- inputText: ${PACK_NAME}

# Fill in Description
- tapOn:
    id: "pack-description-input"
- inputText: "Created by Maestro E2E test"

# Dismiss the keyboard before submitting
- hideKeyboard

# Submit the form via the submit button (testID: submit-pack-button)
- tapOn:
    id: "submit-pack-button"

- waitForAnimationToEnd

# Wait until the submit button disappears, confirming navigation away from the form
- extendedWaitUntil:
    notVisible:
      id: "submit-pack-button"
    timeout: 15000

# Assert we are back on the packs list
- assertVisible:
    id: "create-pack-button"

# iOS: the "Save Password?" keychain prompt can appear late — after returning
# from any form with a password field. Dismiss it before scrolling so it
# doesn't intercept taps or obscure the list.
- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          when:
            visible:
              text: "Not Now"
          commands:
            - tapOn:
                text: "Not Now"
            - waitForAnimationToEnd

# Verify the new pack is in the list.
# Android: scrollUntilVisible works correctly. New packs are at the BOTTOM of the oldest-first
# list, so direction: DOWN (Maestro swipes UP from center) reveals them.
- runFlow:
    when:
      platform: Android
    commands:
      - waitForAnimationToEnd
      - scrollUntilVisible:
          element:
            text: ${PACK_NAME}
          direction: DOWN
          timeout: 60000
          speed: 80
      - assertVisible:
          text: ${PACK_NAME}

# iOS: scrollUntilVisible cannot reliably detect FlatList items through the LargeTitleHeader
# accessibility tree even when the item is visually present. Use the native search bar instead
# to filter directly to the new pack, then dismiss search so subsequent flows see the full list.
- runFlow:
    when:
      platform: iOS
    commands:
      - waitForAnimationToEnd
      - tapOn:
          text: "Search..."
      - inputText: ${PACK_NAME}
      - assertVisible:
          text: ${PACK_NAME}
      - tapOn:
          text: "Trips"
      - waitForAnimationToEnd
