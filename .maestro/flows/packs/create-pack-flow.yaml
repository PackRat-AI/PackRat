appId: com.andrewbierman.packrat
---
# Create Pack Flow: Navigate to packs tab and create a new pack
- waitForAnimationToEnd

# Navigate to the Packs tab
- tapOn:
    text: "Packs"

- waitForAnimationToEnd

# Tap the header "+" button (testID: create-pack-button) to open the pack creation form
- tapOn:
    id: "create-pack-button"

- waitForAnimationToEnd

# Fill in Pack Name
- tapOn:
    text: "Pack Name"
- typeText: ${PACK_NAME}

# Fill in Description
- tapOn:
    text: "Description"
- typeText: "Created by Maestro E2E test"

# Submit the form via the submit button (testID: submit-pack-button)
- tapOn:
    id: "submit-pack-button"

- waitForAnimationToEnd

# Verify we've returned to the packs list (form submit button should no longer be visible)
- assertNotVisible:
    id: "submit-pack-button"

# Assert the pack was created - we should see the pack name in the details or list
- assertVisible:
    text: ${PACK_NAME}
