appId: ${APP_ID}
---
# Add Item Actions Flow: Verify the add-item bottom sheet options
- waitForAnimationToEnd

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap the test pack.
# iOS: use search + testID to avoid hitting the UITextField that shares the same text.
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Search..."
      - eraseText: 100  # clear any text left from a previous flow before typing
      - inputText: ${PACK_NAME}
      - tapOn:
          id: "pack-search-result"
      - waitForAnimationToEnd

# Android: tap pack card in the list.
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          text: ${PACK_NAME}
      - waitForAnimationToEnd

# Tap Add Item button
- tapOn:
    id: "add-item-button"
- waitForAnimationToEnd

# Assert all three add-item options are visible
- assertVisible:
    id: "add-manually-option"
- assertVisible:
    id: "scan-from-photo-option"
- assertVisible:
    id: "add-from-catalog-option"

# Dismiss the bottom sheet
- back
- waitForAnimationToEnd

# Go back to packs list
# iOS: use edge-swipe gesture for reliable stack-pop navigation.
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          start: "2%,50%"
          end: "80%,50%"
          duration: 500
      - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
