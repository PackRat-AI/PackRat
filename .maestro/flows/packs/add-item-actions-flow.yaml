appId: ${APP_ID}
---
# Add Item Actions Flow: Verify the add-item bottom sheet options
- waitForAnimationToEnd

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap the pack created earlier in this run
- scrollUntilVisible:
    element:
      id: "packs:list-item-${PACK_NAME}"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "packs:list-item-${PACK_NAME}"
- waitForAnimationToEnd

# Tap Add Item button
- tapOn:
    id: "add-item-button"
- waitForAnimationToEnd

# Assert all three add-item options are visible
- assertVisible:
    id: "add-manually-option"
- assertVisible:
    id: "scan-from-photo-option"
- assertVisible:
    id: "add-from-catalog-option"

# Dismiss the bottom sheet - platform specific
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          direction: DOWN
          duration: 300
- waitForAnimationToEnd
# Go back to packs list - platform specific
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: ".*Back.*"
- waitForAnimationToEnd
