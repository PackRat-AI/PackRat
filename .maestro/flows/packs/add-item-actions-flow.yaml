appId: ${APP_ID}
---
# Add Item Actions Flow: Verify the add-item bottom sheet options
- waitForAnimationToEnd

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap the test pack.
# iOS: use search + testID to avoid hitting the UITextField that shares the same text.
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Search..."
      - eraseText: 100  # clear any text left from a previous flow before typing
      - inputText: ${PACK_NAME}
      - tapOn:
          id: "pack-search-result"
      - waitForAnimationToEnd

# Android: tap pack card in the list.
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          text: ${PACK_NAME}
      - waitForAnimationToEnd

# Tap Add Item button
- tapOn:
    id: "add-item-button"
- waitForAnimationToEnd

# Assert all three add-item options are visible
- assertVisible:
    id: "add-manually-option"
- assertVisible:
    id: "scan-from-photo-option"
- assertVisible:
    id: "add-from-catalog-option"

# Dismiss the bottom sheet
- back
- waitForAnimationToEnd

# Go back to packs list
# iOS: XCTest synthetic swipes do not trigger UIScreenEdgePanGestureRecognizer.
# Tap the native navigation bar back button instead (accessibility label "Back").
# The first tap may land on the sheet's dimmed overlay (dismissing it) rather than
# on the nav button. If we're still on Pack Details after the first tap, tap Back again.
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Back"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "add-item-button"
          commands:
            - tapOn:
                text: "Back"
            - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
