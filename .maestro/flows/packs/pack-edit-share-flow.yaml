appId: ${APP_ID}
---
# Pack Edit & Share Flow: Tests BUG-5 — edit and share buttons non-functional
# This test documents that edit/share buttons don't respond (GH issue #1948)
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Packs"
    timeout: 30000

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap into the pack created earlier in this run
- scrollUntilVisible:
    element:
      id: "packs:list-item-${PACK_NAME}"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "packs:list-item-${PACK_NAME}"
- waitForAnimationToEnd

# Assert pack detail loaded
- assertVisible:
    text: "Pack Details"

# Open edit form from the header action and verify the created pack is loaded.
- tapOn:
    id: "packs:edit"
- waitForAnimationToEnd
- assertVisible:
    id: "packs:name-input"
- assertVisible:
    text: ${PACK_NAME}

# Return to the detail view without saving changes.
- back
- waitForAnimationToEnd

# Verify the pack has expected content
- assertVisible:
    text: ${PACK_NAME}

# Verify key sections are present
- assertVisible:
    text: "Add Item"

# Verify item tabs exist
- assertVisible:
    text: "All Items"

# Go back to packs list
- back
- waitForAnimationToEnd
