appId: ${APP_ID}
---
# Pack Templates Flow: Tests the pack templates section from dashboard
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Dashboard"
    timeout: 30000

# Navigate to Dashboard
- tapOn:
    text: "Dashboard"
- waitForAnimationToEnd

# Scroll to find the Pack Templates tile
- scrollUntilVisible:
    element:
      text: "Pack Templates"
    direction: DOWN

# Tap the Pack Templates tile
- tapOn:
    id: "dashboard-tile-pack-templates"
- waitForAnimationToEnd

# Assert templates page loaded
- extendedWaitUntil:
    visible:
      text: "All"
    timeout: 10000

# Verify template tabs exist (All / Featured / Yours)
- assertVisible:
    text: "Featured"

# Verify either seeded templates or the empty state renders.
- runFlow:
    when:
      visible:
        id: "pack-templates:card-.*"
    commands:
      - assertVisible:
          id: "pack-templates:card-.*"
- runFlow:
    when:
      visible:
        text: "No templates found"
    commands:
      - assertVisible:
          text: "Create Template"

# Go back to dashboard
- back
- waitForAnimationToEnd

# Verify we returned to Dashboard
- assertVisible:
    text: "Dashboard"
