appId: ${APP_ID}
---
# Catalog Search Flow: Tests BUG-4 — catalog search doesn't filter (GH issue #1946)
# The search bar exists as an icon but has no accessible text selector
# This test verifies catalog loads and category filters work
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Catalog"
    timeout: 30000

# Navigate to Catalog tab
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd

# Assert catalog loaded with items
- assertVisible:
    text: "Catalog"
- runFlow:
    when:
      visible:
        text: "Error loading items"
    commands:
      - assertVisible:
          text: "Retry"
- runFlow:
    when:
      visible:
        text: "Clothing"
    commands:
      - assertVisible:
          text: "All"
      - assertVisible:
          id: "catalog:item-.*"
      - tapOn:
          text: "Clothing"
      - waitForAnimationToEnd
      - assertVisible:
          text: "Catalog"
      - tapOn:
          text: "All"
      - waitForAnimationToEnd
      - assertVisible:
          id: "catalog:item-.*"
