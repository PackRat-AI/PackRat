appId: ${APP_ID}
---
# Catalog Browse Flow: Verify catalog tab loads items and categories
- waitForAnimationToEnd
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd
- assertVisible:
    text: "Catalog"
- assertVisible:
    text: "All"
- assertVisible:
    text: ".*items.*"
- scrollUntilVisible:
    element:
      text: "Showing.*items"
    direction: DOWN
    timeout: 10000
    speed: 20
- tapOn:
    text: "Packs"
- waitForAnimationToEnd