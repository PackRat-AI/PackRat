appId: ${APP_ID}
---
# Catalog Browse Flow: Verify catalog tab loads items and categories
- waitForAnimationToEnd

# Navigate to Catalog tab
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd

# Assert catalog header loaded
- assertVisible:
    text: "Catalog"

# Wait for items to load (the item count text confirms data arrived)
- extendedWaitUntil:
    visible:
      text: ".*items.*"
    timeout: 15000

# Assert category filters render
- assertVisible:
    text: "All"

# Return to stable state
- tapOn:
    text: "Packs"
- waitForAnimationToEnd
