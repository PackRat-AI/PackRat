appId: ${APP_ID}
---
# Catalog Browse Flow: Verify catalog tab loads items and categories
- waitForAnimationToEnd
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd
- assertVisible:
    text: "Catalog"
- runFlow:
    when:
      visible:
        text: "Error loading items"
    commands:
      - assertVisible:
          text: "Retry"
- runFlow:
    when:
      visible:
        text: "All"
    commands:
      - assertVisible:
          id: "catalog:item-.*"
      - scrollUntilVisible:
          element:
            id: "catalog:item-.*"
          direction: DOWN
          timeout: 10000
          speed: 20
- tapOn:
    text: "Packs"
- waitForAnimationToEnd
