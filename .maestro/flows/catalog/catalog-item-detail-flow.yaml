appId: ${APP_ID}
---
# Catalog Item Detail Flow: Tap a catalog item and verify detail page
- waitForAnimationToEnd

# Navigate to Catalog tab
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd

# Wait for items to load
- extendedWaitUntil:
    visible:
      text: ".*items.*"
    timeout: 15000

# CatalogItemCard renders weight as a plain <Text> (e.g. "1.5 kg", "300 g").
# Tapping the weight text fires the card's TouchableWithoutFeedback onPress,
# navigating to the item detail screen.
- scrollUntilVisible:
    element:
      text: ".*\\d+\\.?\\d* (kg|g|oz|lb|lbs)"
    direction: DOWN
    timeout: 15000

- tapOn:
    text: ".*\\d+\\.?\\d* (kg|g|oz|lb|lbs)"
- waitForAnimationToEnd

# Assert item detail elements via testIDs
- assertVisible:
    id: "add-to-pack-button"
- assertVisible:
    id: "view-retailer-button"

# Go back
- back
- waitForAnimationToEnd
