appId: ${APP_ID}
---
# Catalog Item Detail Flow: Tap a catalog item and verify detail page
- waitForAnimationToEnd

# Navigate to Catalog tab
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd

# Wait for items to load before scrolling
- extendedWaitUntil:
    visible:
      text: ".*items.*"
    timeout: 15000

# Scroll to find a priced item
- scrollUntilVisible:
    element:
      text: ".*\\$.*"
    direction: DOWN

# Tap the first visible priced item
- tapOn:
    text: ".*\\$.*"
- waitForAnimationToEnd

# Assert item detail elements via testIDs
- assertVisible:
    id: "add-to-pack-button"
- assertVisible:
    id: "view-retailer-button"

# Go back
- back
- waitForAnimationToEnd
