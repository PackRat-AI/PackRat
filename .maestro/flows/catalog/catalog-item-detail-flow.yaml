appId: ${APP_ID}
---
# Catalog Item Detail Flow: Tap a catalog item and verify detail page
- waitForAnimationToEnd
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd
# Wait for items to load
- runFlow:
    when:
      visible:
        text: "Error loading items"
    commands:
      - assertVisible:
          text: "Retry"
- runFlow:
    when:
      visible:
        id: "catalog:item-.*"
    commands:
      - tapOn:
          id: "catalog:item-.*"
          index: 0
      - waitForAnimationToEnd
      - scrollUntilVisible:
          element:
            id: "add-to-pack-button"
          direction: DOWN
          timeout: 15000
      - assertVisible:
          id: "add-to-pack-button"
      - scrollUntilVisible:
          element:
            id: "view-retailer-button"
          direction: DOWN
          speed: 10
          timeout: 10000
      - assertVisible:
          id: "view-retailer-button"
      - runFlow:
          when:
            platform: Android
          commands:
            - back
      - runFlow:
          when:
            platform: iOS
          commands:
            - tapOn:
                text: ".*Back.*"
      - waitForAnimationToEnd
