appId: ${APP_ID}
---
# Catalog Item Detail Flow: Tap a catalog item and verify detail page
- waitForAnimationToEnd

# Navigate to Catalog tab
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd

# Wait for catalog items to load via testID.
# Text-based assertions are unreliable on iOS (nativewindui Text uses UITextView
# which exposes content as accessibilityValue, not accessibilityLabel).
- extendedWaitUntil:
    visible:
      id: "catalog-item-card"
    timeout: 15000

# Tap the first visible catalog item by testID.
# Using id: instead of text: avoids UITextView accessibilityValue issues on iOS.
- tapOn:
    id: "catalog-item-card"
- waitForAnimationToEnd

# Wait for item detail to finish loading (network request), then assert buttons.
- extendedWaitUntil:
    visible:
      id: "add-to-pack-button"
    timeout: 15000
- assertVisible:
    id: "view-retailer-button"

# Go back
# iOS: XCTest synthetic swipes do not trigger UIScreenEdgePanGestureRecognizer.
# Tap the native navigation bar back button instead (accessibility label "Back").
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Back"
      - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
