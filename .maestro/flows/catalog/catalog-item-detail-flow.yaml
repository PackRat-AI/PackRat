appId: ${APP_ID}
---
# Catalog Item Detail Flow: Tap a catalog item and verify detail page
- waitForAnimationToEnd
- tapOn:
    text: "Catalog"
- waitForAnimationToEnd
# Wait for items to load
- assertVisible:
    text: ".*items.*"
# Tap first visible item using index
- tapOn:
    id: "catalog-item"
    index: 0
- waitForAnimationToEnd
# Scroll down to find action buttons
- scrollUntilVisible:
    element:
      id: "add-to-pack-button"
    direction: DOWN
    speed: 10
    timeout: 10000
- assertVisible:
    id: "add-to-pack-button"
- scrollUntilVisible:
    element:
      id: "view-retailer-button"
    direction: DOWN
    speed: 10
    timeout: 10000
- assertVisible:
    id: "view-retailer-button"
# Go back - platform specific
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: ".*Back.*"
- waitForAnimationToEnd