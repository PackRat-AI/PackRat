appId: com.packratai.mobile
---
# AI Chat Dashboard Flow: Tests the general AI assistant from dashboard
# Also tests BUG-3 — no back button (GH issue #1945)
- launchApp
- waitForAnimationToEnd

# Navigate to Dashboard
- tapOn:
    text: "Dashboard"
- waitForAnimationToEnd

# Scroll to find the PackRat AI tile
- scrollUntilVisible:
    element:
      text: "PackRat AI"
    direction: DOWN

# Tap the AI tile
- tapOn:
    text: "PackRat AI"
- waitForAnimationToEnd

# Assert AI chat loaded with general greeting
- extendedWaitUntil:
    visible:
      text: "PackRat AI assistant"
    timeout: 10000

# Assert suggestion chips are present
- assertVisible:
    text: "SUGGESTIONS"

# Assert date is shown
- assertVisible:
    text: "2026"

# BUG-3: Verify there is NO back/close button (documenting the bug)
# When fixed, this assertion should be REMOVED and replaced with:
# - assertVisible: { text: "Close" } or similar

# Verify the bottom tab bar is NOT visible (part of BUG-3)
- assertNotVisible:
    text: "Packs"

# Use system back to exit (only way out currently)
- back
- waitForAnimationToEnd

# Verify we returned to Dashboard
- assertVisible:
    text: "Dashboard"
