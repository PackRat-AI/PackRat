appId: ${APP_ID}
---
# AI Chat Pack Flow: Verifies Ask AI button exists on pack detail
# BUG-8: AI chat shows "Login Required" even when logged in AND destroys the session
# NOTE: This test intentionally does NOT tap Ask AI to avoid session destruction
- launchApp
- waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          when:
            visible:
              text: "Software update"
          commands:
            - back
            - waitForAnimationToEnd
            - launchApp
      - runFlow:
          when:
            visible:
              text: "Update ready to install"
          commands:
            - back
            - waitForAnimationToEnd
            - launchApp
- extendedWaitUntil:
    visible:
      text: "Packs"
    timeout: 60000

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# Tap into the pack created earlier in this run
- scrollUntilVisible:
    element:
      id: "packs:list-item-${PACK_NAME}"
    direction: DOWN
    timeout: 60000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
- tapOn:
    id: "packs:list-item-${PACK_NAME}"
- waitForAnimationToEnd

# Assert pack detail loaded
- assertVisible:
    text: "Pack Details"

# Scroll to verify Ask AI button exists
- scrollUntilVisible:
    element:
      text: "Ask AI"
    direction: DOWN

# Assert button is present
- assertVisible:
    text: "Ask AI"

# Do NOT tap — BUG-8 causes session destruction
# When BUG-8 is fixed, uncomment to test full AI chat:
# - tapOn:
#     text: "Ask AI"
# - waitForAnimationToEnd
# - assertVisible:
#     text: ${PACK_NAME}
# - back
# - waitForAnimationToEnd

# Go back to packs list
- back
- waitForAnimationToEnd
