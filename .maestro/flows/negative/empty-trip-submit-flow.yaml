appId: ${APP_ID}
---
# Empty Trip Submit Flow: Verify form validation prevents empty trip creation
- waitForAnimationToEnd
- tapOn:
    text: "Trips"
- waitForAnimationToEnd
- tapOn:
    id: "create-trip-button"
- waitForAnimationToEnd
# Try to submit without filling any fields
- tapOn:
    id: "submit-trip-button"
- waitForAnimationToEnd
# Should still be on the form (validation blocked submit)
- assertVisible:
    id: "submit-trip-button"
# Dismiss - platform specific
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
    - swipe:
          direction: DOWN
          duration: 300
- waitForAnimationToEnd