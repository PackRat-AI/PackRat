appId: ${APP_ID}
---
# Empty Trip Submit Flow: Verify form validation prevents empty trip creation
- waitForAnimationToEnd

# Navigate to Trips tab
- tapOn:
    text: "Trips"
- waitForAnimationToEnd

# Tap create trip button
- tapOn:
    id: "create-trip-button"
- waitForAnimationToEnd

# Try to submit without filling any fields
- tapOn:
    id: "submit-trip-button"
- waitForAnimationToEnd

# Should still be on the form
- assertVisible:
    id: "submit-trip-button"

# Go back
# iOS: hardware back is unreliable from a root-stack screen with NativeTabs as parent.
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          startRelative: "2%,50%"
          endRelative: "80%,50%"
          duration: 500
      - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
