appId: ${APP_ID}
---
# Invalid Login Flow: Tests error handling for wrong credentials
# Verifies the app shows an error dialog and stays on the login form
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd

# Dismiss Android ANR dialog that can appear during emulator boot
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          when:
            visible:
              text: "isn't responding"
          commands:
            - tapOn:
                text: "Wait"
            - waitForAnimationToEnd

# Wait for auth entry screen
- extendedWaitUntil:
    visible:
      id: "sign-in-email-button"
    timeout: 15000

# Navigate to Sign In
- tapOn:
    id: "sign-in-email-button"
- waitForAnimationToEnd

# Fill in invalid email
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Email"
      - inputText: "invalid@nonexistent.com"
      - tapOn:
          text: "Password"
      - inputText: "wrongpassword123"
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: "email-input"
      - inputText: "invalid@nonexistent.com"
      - tapOn:
          id: "password-input"
      - inputText: "wrongpassword123"

- hideKeyboard

# Submit via testID — avoids "Submit" vs "Continue" platform difference
- tapOn:
    id: "continue-button"
- waitForAnimationToEnd

# Should show Login Failed error dialog
- extendedWaitUntil:
    visible:
      text: "Login Failed"
    timeout: 10000

- assertVisible:
    text: "Invalid email or password"

# Dismiss the error dialog
- tapOn:
    text: "OK"
- waitForAnimationToEnd

# Should still be on login form
- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible:
          text: "Email"
- runFlow:
    when:
      platform: Android
    commands:
      - assertVisible:
          id: "email-input"
