appId: ${APP_ID}
---
# Invalid Login Flow: Tests error handling for wrong credentials
# Verifies the app shows an error dialog and stays on the login form
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "http://.*"
    commands:
      - tapOn:
          text: "http://.*"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Runtime version:.*"
    commands:
      - tapOn:
          text: "Close"
      - waitForAnimationToEnd

# Navigate to Sign In
- extendedWaitUntil:
    visible:
      id: "sign-in-email-button"
    timeout: 35000

- tapOn:
    id: "sign-in-email-button"
- waitForAnimationToEnd

# Wait for the login form
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000

# Fill in invalid credentials
- tapOn:
    id: "email-input"
- inputText: "invalid@nonexistent.com"

- tapOn:
    id: "password-input"
- inputText: "wrongpassword123"

- hideKeyboard

# Submit
- tapOn:
    id: "continue-button"
- waitForAnimationToEnd

# Should show Login Failed error dialog
- extendedWaitUntil:
    visible:
      text: "Login Failed"
    timeout: 10000

- assertVisible:
    text: "Invalid email or password\\.?"

# Dismiss the error dialog
- tapOn:
    text: "OK"
- waitForAnimationToEnd

# Should still be on login form
- assertVisible:
    id: "email-input"
