appId: com.packratai.mobile
---
# Empty Pack Submit Flow: Tests that creating a pack with no name is prevented
# Verifies form validation on the pack creation form
# Note: This flow runs after invalid-login which clears state, so we re-login first
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd

# Login first (state was cleared by previous flow)
- extendedWaitUntil:
    visible:
      text: "Sign In"
    timeout: 10000

- tapOn:
    text: "Sign In"
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Email"
    commands:
      - tapOn:
          text: "Sign In"
      - waitForAnimationToEnd

- tapOn:
    text: "Email"
- inputText: ${TEST_EMAIL}

- tapOn:
    text: "Password"
- inputText: ${TEST_PASSWORD}

- hideKeyboard

- tapOn:
    text: "Submit"

- extendedWaitUntil:
    visible:
      text: "Dashboard"
    timeout: 20000

# Open create pack form via deep link
- openLink: "packrat://pack/new"
- waitForAnimationToEnd

# Handle Android "Open with" chooser if two builds are installed
- runFlow:
    when:
      visible:
        text: "Open with"
    commands:
      - tapOn:
          text: "PackRat"
          index: 1
- runFlow:
    when:
      visible:
        text: "Just once"
    commands:
      - tapOn:
          text: "Just once"

- extendedWaitUntil:
    visible:
      text: "Create Pack"
    timeout: 10000

# Assert form loaded
- assertVisible:
    text: "Pack Name"

# Try to submit without filling any fields
- scrollUntilVisible:
    element:
      text: "Create Pack"
    direction: DOWN

- tapOn:
    text: "Create Pack"
    index: 1
- waitForAnimationToEnd

# Should NOT navigate away — should show validation error or stay on form
- assertVisible:
    text: "Pack Name"

# Go back without creating
- back
- waitForAnimationToEnd
