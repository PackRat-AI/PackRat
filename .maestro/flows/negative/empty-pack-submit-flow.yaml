appId: ${APP_ID}
---
# Empty Pack Submit Flow: Verify form validation prevents empty pack creation
- waitForAnimationToEnd

# Navigate to Packs tab
- tapOn:
    text: "Packs"
- waitForAnimationToEnd

# iOS: returning to the Packs tab can restore the search bar as first responder,
# overlaying the screen and suppressing the navigation bar's create-pack-button
# from the accessibility tree. Dismiss it if visible.
- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          when:
            visible:
              text: "Cancel"
          commands:
            - tapOn:
                text: "Cancel"
            - waitForAnimationToEnd

# Tap create pack button
- tapOn:
    id: "create-pack-button"
- waitForAnimationToEnd

# Try to submit without filling any fields
- tapOn:
    id: "submit-pack-button"
- waitForAnimationToEnd

# Should still be on the form (submit button still visible = didn't navigate away)
- assertVisible:
    id: "submit-pack-button"

# Go back
# iOS: XCTest synthetic swipes do not trigger UIScreenEdgePanGestureRecognizer.
# Tap the native navigation bar back button instead (accessibility label "Back").
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "Back"
      - waitForAnimationToEnd
- runFlow:
    when:
      platform: Android
    commands:
      - back
      - waitForAnimationToEnd
