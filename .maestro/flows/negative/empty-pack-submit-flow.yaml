appId: ${APP_ID}
---
# Empty Pack Submit Flow: Verify form validation prevents empty pack creation
- waitForAnimationToEnd
- tapOn:
    text: "Packs"
- waitForAnimationToEnd
- tapOn:
    id: "create-pack-button"
- waitForAnimationToEnd
# Try to submit without filling any fields
- tapOn:
    id: "submit-pack-button"
- waitForAnimationToEnd
# Should still be on the form (submit button still visible = validation blocked submit)
- assertVisible:
    id: "submit-pack-button"
# Dismiss the sheet - platform specific
- runFlow:
    when:
      platform: Android
    commands:
      - back
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          direction: DOWN
          duration: 300
- waitForAnimationToEnd