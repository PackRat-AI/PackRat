pre-commit:
  skip:
    - run: test "${CI:-false}" = "true"
    - run: test "${GITHUB_ACTIONS:-false}" = "true"
  commands:
    lint:
      run: bun check {staged_files}
      fail_text: "Linting failed! \nRun `bun lint` to fix. \nCommit with `--no-verify` to bypass check."
    android-textinput-check:
      run: ./scripts/check-android-textinput.sh
      fail_text: "Android TextInput issues detected! \nSee docs/android-textinput-checklist.md \nCommit with `--no-verify` to bypass check."
