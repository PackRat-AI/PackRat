services:
  postgres-e2e:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: packrat_e2e
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_pass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_user -d packrat_e2e"]
      interval: 3s
      timeout: 5s
      retries: 15

volumes:
  postgres_e2e_data:
