version: 2

updates:
  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'ci/cd'
    commit-message:
      prefix: 'chore(ci)'

  # bun workspaces — root (covers all workspace members via the shared bun.lock)
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
    ignore:
      # Avoid major version bumps for heavy cross-platform deps — review manually
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore(deps)'
    groups:
      expo-sdk:
        patterns:
          - 'expo*'
          - '@expo/*'
      react-query:
        patterns:
          - '@tanstack/*'
      elysia:
        patterns:
          - 'elysia'
          - '@elysiajs/*'
      drizzle:
        patterns:
          - 'drizzle-orm'
          - 'drizzle-kit'
