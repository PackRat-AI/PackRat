name: Unit Tests

on:
  push:
    branches: ["main", "development"]
    paths:
      - "package.json"
      - "bun.lock"
      - "packages/api/src/**"
      - "packages/api/package.json"
      - "packages/api/vitest.unit.config.ts"
      - "apps/expo/package.json"
      - "apps/expo/vitest.config.ts"
      - "apps/expo/utils/**"
      - "apps/expo/lib/utils/**"
      - "apps/expo/features/**/utils/**"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "package.json"
      - "bun.lock"
      - "packages/api/src/**"
      - "packages/api/package.json"
      - "packages/api/vitest.unit.config.ts"
      - "apps/expo/package.json"
      - "apps/expo/vitest.config.ts"
      - "apps/expo/utils/**"
      - "apps/expo/lib/utils/**"
      - "apps/expo/features/**/utils/**"
      - ".github/workflows/unit-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  api-unit-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-api-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-api-

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Run API unit tests
        run: bunx turbo run test:unit:coverage --filter=@packrat/api

      - name: Report API coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: API Unit Tests Coverage
          json-summary-path: ./coverage/unit/coverage-summary.json
          json-final-path: ./coverage/unit/coverage-final.json
          vite-config-path: ./vitest.unit.config.ts
          working-directory: ./packages/api

  expo-unit-tests:
    name: Expo Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-expo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-expo-

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Run Expo unit tests
        run: bunx turbo run test:coverage --filter=packrat-expo-app

      - name: Report Expo coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Expo Unit Tests Coverage
          json-summary-path: ./coverage/unit/coverage-summary.json
          json-final-path: ./coverage/unit/coverage-final.json
          vite-config-path: ./vitest.config.ts
          working-directory: ./apps/expo
