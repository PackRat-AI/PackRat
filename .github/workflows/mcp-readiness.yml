name: MCP Submission Readiness

# U18 + U7 refactor: on-demand pre-submission probe for the PackRat MCP
# Worker.
#
# Operators trigger this workflow before pushing an `mcp-v*` deploy tag,
# and again immediately after the deploy lands, to confirm every
# Anthropic-side intake heuristic still passes. The script runs entirely
# from the GitHub Actions runner — no Cloudflare credentials are needed
# because it only speaks HTTPS to public endpoints (the MCP resource
# server, the API authorization server, and packratai.com). Exit code 0 =
# green, 1 = at least one check failed.
#
# Cross-origin architecture (post-U1 refactor):
#   RS (resource server)       = https://mcp.packratai.com
#                                hosts /mcp + PRM + /health + /status + favicon
#   AS (authorization server)  = https://api.packrat.world
#                                hosts AS metadata + /oauth2/authorize + /oauth2/token + JWKS
# The probe needs both URLs; the defaults match prod.
#
# Local equivalent:
#   bun packages/mcp/scripts/submission-readiness.ts
#   bun packages/mcp/scripts/submission-readiness.ts \
#     --rs-url https://staging-mcp.example.com \
#     --as-url https://staging-api.example.com
#
# Why workflow_dispatch only:
#   The probe targets DEPLOYED infrastructure. Running it on every PR
#   would either fail (worker not deployed for that branch) or test the
#   wrong thing (the script doesn't exercise the PR's code; it exercises
#   the live worker). Operator-driven trigger keeps the meaning clear.

on:
  workflow_dispatch:
    inputs:
      rs_url:
        description: 'MCP resource-server base URL (prod default: https://mcp.packratai.com)'
        required: false
        default: 'https://mcp.packratai.com'
      as_url:
        description: 'OAuth authorization-server base URL (prod default: https://api.packrat.world)'
        required: false
        default: 'https://api.packrat.world'
      brand_domain:
        description: 'PackRat brand domain (default: https://packratai.com)'
        required: false
        default: 'https://packratai.com'

concurrency:
  # One readiness probe per (RS, AS) target pair at a time — back-to-back
  # triggers don't race.
  group: mcp-readiness-${{ github.event.inputs.rs_url }}-${{ github.event.inputs.as_url }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  readiness:
    name: Submission readiness (${{ github.event.inputs.rs_url }} / ${{ github.event.inputs.as_url }})
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      # Make sure the catalog the readiness script reads is fresh.
      # `dump-catalog.ts` is idempotent — re-running on an unchanged tool
      # surface produces a byte-identical file.
      - name: Refresh tool catalog
        run: bun packages/mcp/scripts/dump-catalog.ts

      - name: Run submission-readiness probe (human-readable)
        env:
          RS_URL: ${{ github.event.inputs.rs_url }}
          AS_URL: ${{ github.event.inputs.as_url }}
          BRAND_DOMAIN: ${{ github.event.inputs.brand_domain }}
        run: |
          bun packages/mcp/scripts/submission-readiness.ts \
            --rs-url "$RS_URL" \
            --as-url "$AS_URL" \
            --brand-domain "$BRAND_DOMAIN"

      # Re-run with --json so the artifact captures the structured
      # report. (Two runs is cheap: each is < 5s of HTTP probes.)
      - name: Run submission-readiness probe (JSON artifact)
        if: always()
        env:
          RS_URL: ${{ github.event.inputs.rs_url }}
          AS_URL: ${{ github.event.inputs.as_url }}
          BRAND_DOMAIN: ${{ github.event.inputs.brand_domain }}
        run: |
          bun packages/mcp/scripts/submission-readiness.ts \
            --rs-url "$RS_URL" \
            --as-url "$AS_URL" \
            --brand-domain "$BRAND_DOMAIN" \
            --json > readiness-report.json || true

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: readiness-report.json
          if-no-files-found: warn
