name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # runs daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity for 60 days. It will be closed in 7 days if no further
            activity occurs. If this issue is still relevant, please leave a comment
            or remove the `stale` label.
          close-issue-message: >
            This issue was closed automatically because it remained stale for 7 days
            with no activity. Feel free to reopen it if the problem persists.
          stale-issue-label: 'stale'
          days-before-issue-stale: 60
          days-before-issue-close: 7
          exempt-issue-labels: 'pinned,security,bug,in-progress'

          # Pull Requests
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity for 30 days. It will be closed in 7 days if no
            further activity occurs. If this PR is still in progress, please leave
            a comment or remove the `stale` label.
          close-pr-message: >
            This pull request was closed automatically because it remained stale for
            7 days with no activity. Feel free to reopen it when you are ready to
            continue.
          stale-pr-label: 'stale'
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-pr-labels: 'pinned,security,in-progress,do-not-merge'
