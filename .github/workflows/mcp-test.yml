name: MCP Tests

# U17 + U7 refactor: PR gate for the PackRat MCP Worker. Runs on any PR
# that touches the MCP package, the api-client (consumed by every tool),
# the API auth surface (which now hosts the OAuth Authorization Server
# via `@better-auth/oauth-provider` per the U1 refactor), the API admin
# routes (which the scope-based admin gate calls into), or the shared
# DB schema (which carries the Better Auth `oauthClient` +
# `oauthAccessToken` + `oauthRefreshToken` + `oauthConsent` tables that
# back the AS — a schema regression here breaks token issuance and
# silently invalidates every MCP install). This deliberately mirrors
# the cross-origin trust boundary the MCP worker straddles — anything
# that can silently break scope enforcement, JWT validation, or tool
# dispatch should re-run this gate before it merges.

on:
  push:
    branches: ['main', 'development']
    paths:
      - 'packages/mcp/**'
      - 'packages/api-client/**'
      - 'packages/api/src/auth/**'
      - 'packages/api/src/routes/admin/**'
      - 'packages/db/src/schema.ts'
      - '.github/workflows/mcp-test.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'packages/mcp/**'
      - 'packages/api-client/**'
      - 'packages/api/src/auth/**'
      - 'packages/api/src/routes/admin/**'
      - 'packages/db/src/schema.ts'
      - '.github/workflows/mcp-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mcp-tests:
    name: MCP Unit + Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Biome (lint + format check)
        run: bun biome check packages/mcp

      # NOTE: no MCP type-check step here. Strict tsc OOMs (>14 GB v8 heap, more
      # than the runner can give) on ~50 McpServer.registerTool calls ×
      # @packrat/api-client's deep Eden `treaty<App>` type × strict null
      # analysis — see #2533. The MCP package is still type-checked at deploy
      # (wrangler) and via Biome above. Re-enable once the Eden surface is
      # bounded behind a typed facade (extract tool handlers; instantiate
      # treaty<App> once) so the type-check fits in memory.

      - name: Run MCP tests (unit + integration)
        run: bun run --cwd packages/mcp test

      # Re-run the API auth + admin guard tests so a MCP-side scope-model
      # change can't silently break the API-side enforcement contract.
      # Post-refactor (U1) this is doubly load-bearing: the API now hosts
      # the OAuth Authorization Server, so any MCP-side change to the
      # JWT-validation contract (token-verify.ts) should re-validate the
      # AS-side token-issuance contract (auth/index.ts +
      # auth/consent-page.ts) before merge.
      - name: Run API unit tests (auth + admin guard)
        run: bun run --cwd packages/api test:unit
