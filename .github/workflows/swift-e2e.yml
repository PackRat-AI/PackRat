name: Swift E2E Tests

on:
  pull_request:
    branches: ["**"]
    paths:
      - "apps/swift/**"
      - "packages/api/src/**"
      - "packages/api/drizzle/**"
      - "packages/api/package.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/swift-e2e.yml"
  push:
    branches: [main, development]
    paths:
      - "apps/swift/**"
      - "packages/api/src/**"
      - "packages/api/drizzle/**"
      - "packages/api/package.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/swift-e2e.yml"
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      run_macos_ui:
        description: "Run the full macOS UI suite on a self-hosted Mac runner"
        required: false
        type: boolean
        default: true
      run_ios_ui:
        description: "Run the exploratory Swift iOS UI suite on a GitHub-hosted macOS runner"
        required: false
        type: boolean
        default: false
      ios_test_plan:
        description: "iOS test depth for manual runs"
        required: false
        type: choice
        default: sanity
        options:
          - sanity
          - smoke
          - full
      api_environment:
        description: "API target for manual runs"
        required: false
        type: choice
        default: configured-secret
        options:
          - configured-secret
          - local
          - dev
          - production
      feature_flag_profile:
        description: "Temporary Swift feature flag profile"
        required: false
        type: choice
        default: default
        options:
          - default
          - all-on
          - all-off
      run_testflight_preflight:
        description: "Verify replacement TestFlight metadata without archiving"
        required: false
        type: boolean
        default: false
      run_testflight_archive_verification:
        description: "Archive/export the replacement app on a Mac runner and verify the built binary metadata without uploading"
        required: false
        type: boolean
        default: false
      replacement_build_number:
        description: "Swift replacement build number intended for upload"
        required: false
        type: string
      current_app_store_build_number:
        description: "Latest existing PackRat App Store/TestFlight build number"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  XCODE_VERSION: "26.2"
  E2E_API_BASE_URL: ${{ secrets.SWIFT_E2E_API_BASE_URL }}
  E2E_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
  E2E_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
  E2E_SCREENSHOT_DIR: ${{ github.workspace }}/apps/swift/TestResults/screenshots
  PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}

jobs:
  testflight-replacement-preflight:
    name: TestFlight replacement preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && inputs.run_testflight_preflight

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Verify replacement TestFlight metadata
        env:
          BUILD_NUMBER: ${{ inputs.replacement_build_number }}
          APP_STORE_CURRENT_BUILD_NUMBER: ${{ inputs.current_app_store_build_number }}
        run: |
          missing=()
          [ -z "${BUILD_NUMBER:-}" ] && missing+=("replacement_build_number")
          [ -z "${APP_STORE_CURRENT_BUILD_NUMBER:-}" ] && missing+=("current_app_store_build_number")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required TestFlight preflight inputs missing: ${missing[*]}"
            exit 1
          fi
          bun swift:testflight:preflight --replacement --production

  testflight-replacement-archive:
    name: TestFlight replacement archive verification
    runs-on: macos-15
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && inputs.run_testflight_archive_verification

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Swift Xcode project
        run: bun run swift

      - name: Verify replacement archive/export metadata
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ inputs.replacement_build_number }}
          APP_STORE_CURRENT_BUILD_NUMBER: ${{ inputs.current_app_store_build_number }}
        run: |
          missing=()
          [ -z "${APPLE_TEAM_ID:-}" ] && missing+=("APPLE_TEAM_ID")
          [ -z "${BUILD_NUMBER:-}" ] && missing+=("replacement_build_number")
          [ -z "${APP_STORE_CURRENT_BUILD_NUMBER:-}" ] && missing+=("current_app_store_build_number")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required TestFlight archive verification inputs missing: ${missing[*]}"
            exit 1
          fi
          bun apps/swift/scripts/upload-testflight.ts --replacement --production --verify-archive-only

  macos-ui:
    name: macOS Swift UI E2E
    runs-on: [self-hosted, macOS, packrat-e2e]
    timeout-minutes: 45
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_macos_ui)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve Swift E2E target
        run: |
          target="${{ inputs.api_environment || 'configured-secret' }}"
          case "$target" in
            configured-secret)
              echo "PACKRAT_ENV=dev" >> "$GITHUB_ENV"
              ;;
            local)
              echo "PACKRAT_ENV=local" >> "$GITHUB_ENV"
              echo "E2E_API_BASE_URL=" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "PACKRAT_ENV=dev" >> "$GITHUB_ENV"
              echo "E2E_API_BASE_URL=https://packrat-api-dev.orange-frost-d665.workers.dev" >> "$GITHUB_ENV"
              ;;
            production)
              echo "PACKRAT_ENV=production" >> "$GITHUB_ENV"
              echo "E2E_API_BASE_URL=https://packrat-api.orange-frost-d665.workers.dev" >> "$GITHUB_ENV"
              ;;
          esac
          echo "PACKRAT_SWIFT_FEATURE_FLAG_PROFILE=${{ inputs.feature_flag_profile || 'default' }}" >> "$GITHUB_ENV"

      - name: Verify Swift E2E secrets
        run: |
          target="${{ inputs.api_environment || 'configured-secret' }}"
          missing=()
          if [ "$target" != "local" ]; then
            [ -z "${E2E_EMAIL:-}" ] && missing+=("E2E_TEST_EMAIL")
            [ -z "${E2E_PASSWORD:-}" ] && missing+=("E2E_TEST_PASSWORD")
          fi
          if [ "$target" = "configured-secret" ] && [ -z "${E2E_API_BASE_URL:-}" ]; then
            missing+=("SWIFT_E2E_API_BASE_URL")
          fi
          if [ "$target" != "local" ] && [ "$target" != "production" ] && [ -z "${NEON_DATABASE_URL:-}" ]; then
            missing+=("NEON_DEV_DATABASE_URL")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required Swift E2E secrets missing: ${missing[*]}"
            exit 1
          fi
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}

      - name: Check Automation Mode status
        run: |
          automationmodetool status || true

      - name: Generate Swift Xcode project
        run: bun run swift

      - name: Seed E2E test user
        if: ${{ (inputs.api_environment || 'configured-secret') != 'local' && (inputs.api_environment || 'configured-secret') != 'production' }}
        run: bun run --filter @packrat/api db:seed:e2e-user
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
          E2E_TEST_EMAIL: ${{ env.E2E_EMAIL }}
          E2E_TEST_PASSWORD: ${{ env.E2E_PASSWORD }}

      - name: Verify deployed Swift auth
        if: ${{ (inputs.api_environment || 'configured-secret') != 'local' }}
        run: bun run apps/swift/scripts/verify-deployed-auth.ts

      - name: Run macOS Swift UI E2E
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            caffeinate -dimsu bun run e2e:swift:mac-smoke
          else
            caffeinate -dimsu bun run e2e:swift:mac-ui
          fi

      - name: Summarize macOS xcresult
        if: always()
        run: |
          result="$(find apps/swift/TestResults -maxdepth 1 -name '*.xcresult' -type d | sort | tail -1)"
          if [ -z "$result" ]; then
            echo "No xcresult bundle found."
            exit 0
          fi
          echo "### macOS Swift UI E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$result\`" >> "$GITHUB_STEP_SUMMARY"
          xcrun xcresulttool get test-results summary --path "$result" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS xcresult
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: swift-macos-ui-xcresult
          path: apps/swift/TestResults/*.xcresult
          retention-days: 14

      - name: Upload macOS screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: swift-macos-ui-screenshots
          path: apps/swift/TestResults/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload macOS failure triage bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-macos-ui-failure-triage
          path: apps/swift/TestResults/
          if-no-files-found: ignore
          retention-days: 14

  ios-ui:
    name: iOS Swift UI E2E (Exploratory)
    runs-on: macos-15
    timeout-minutes: 60
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_ios_ui)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve Swift E2E target
        run: |
          target="${{ inputs.api_environment || 'configured-secret' }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            target="local"
            {
              echo "E2E_EMAIL=${E2E_EMAIL:-e2e@packrattest.local}"
              echo "E2E_PASSWORD=${E2E_PASSWORD:-E2eTestPass123!}"
              echo "E2E_TEST_EMAIL=${E2E_EMAIL:-e2e@packrattest.local}"
              echo "E2E_TEST_PASSWORD=${E2E_PASSWORD:-E2eTestPass123!}"
            } >> "$GITHUB_ENV"
          fi
          case "$target" in
            configured-secret)
              echo "PACKRAT_ENV=dev" >> "$GITHUB_ENV"
              ;;
            local)
              echo "PACKRAT_ENV=local" >> "$GITHUB_ENV"
              echo "E2E_API_BASE_URL=" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "PACKRAT_ENV=dev" >> "$GITHUB_ENV"
              echo "E2E_API_BASE_URL=https://packrat-api-dev.orange-frost-d665.workers.dev" >> "$GITHUB_ENV"
              ;;
            production)
              echo "PACKRAT_ENV=production" >> "$GITHUB_ENV"
              echo "E2E_API_BASE_URL=https://packrat-api.orange-frost-d665.workers.dev" >> "$GITHUB_ENV"
              ;;
          esac
          echo "PACKRAT_SWIFT_FEATURE_FLAG_PROFILE=${{ inputs.feature_flag_profile || 'default' }}" >> "$GITHUB_ENV"

      - name: Verify Swift E2E secrets
        run: |
          target="${{ inputs.api_environment || 'configured-secret' }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            target="local"
          fi
          missing=()
          if [ "$target" != "local" ]; then
            [ -z "${E2E_EMAIL:-}" ] && missing+=("E2E_TEST_EMAIL")
            [ -z "${E2E_PASSWORD:-}" ] && missing+=("E2E_TEST_PASSWORD")
          fi
          if [ "$target" = "configured-secret" ] && [ -z "${E2E_API_BASE_URL:-}" ]; then
            missing+=("SWIFT_E2E_API_BASE_URL")
          fi
          if [ "$target" != "local" ] && [ "$target" != "production" ] && [ -z "${NEON_DATABASE_URL:-}" ]; then
            missing+=("NEON_DEV_DATABASE_URL")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required Swift E2E secrets missing: ${missing[*]}"
            exit 1
          fi
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}

      - name: Generate Swift Xcode project
        run: bun run swift

      - name: Seed E2E test user
        if: ${{ github.event_name != 'pull_request' && (inputs.api_environment || 'configured-secret') != 'local' && (inputs.api_environment || 'configured-secret') != 'production' }}
        run: bun run --filter @packrat/api db:seed:e2e-user
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
          E2E_TEST_EMAIL: ${{ env.E2E_EMAIL }}
          E2E_TEST_PASSWORD: ${{ env.E2E_PASSWORD }}

      - name: Verify deployed Swift auth
        if: ${{ github.event_name != 'pull_request' && (inputs.api_environment || 'configured-secret') != 'local' }}
        run: bun run apps/swift/scripts/verify-deployed-auth.ts

      - name: Boot iOS simulator
        run: |
          DEVICE_ID=$(xcrun simctl create Swift-E2E "iPhone 17" \
            "$(xcrun simctl list runtimes -j | jq -r '.runtimes[] | select(.identifier | contains("iOS-")) | .identifier' | sort -V | tail -1)")
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"
          echo "IOS_SIMULATOR_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Run iOS Swift UI E2E
        run: |
          plan="${{ inputs.ios_test_plan || 'full' }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            plan="sanity"
          fi
          if [ "$plan" = "full" ]; then
            bun run e2e:swift:ios
          elif [ "$plan" = "smoke" ]; then
            bun run e2e:swift:ios-smoke
          else
            bun run e2e:swift:ios-sanity
          fi

      - name: Summarize iOS xcresult
        if: always()
        run: |
          result="$(find apps/swift/TestResults -maxdepth 1 -name '*.xcresult' -type d | sort | tail -1)"
          if [ -z "$result" ]; then
            echo "No xcresult bundle found."
            exit 0
          fi
          echo "### iOS Swift UI E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$result\`" >> "$GITHUB_STEP_SUMMARY"
          xcrun xcresulttool get test-results summary --path "$result" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS xcresult
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: swift-ios-ui-xcresult
          path: apps/swift/TestResults/*.xcresult
          retention-days: 14

      - name: Upload iOS screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: swift-ios-ui-screenshots
          path: apps/swift/TestResults/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload iOS failure triage bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-ios-ui-failure-triage
          path: apps/swift/TestResults/
          if-no-files-found: ignore
          retention-days: 14
