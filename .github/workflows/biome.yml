name: Biome Check

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: read

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN || github.token }}
        run: bun install
      - name: Run Biome check
        run: bun biome check
      - name: Check circular dependencies
        run: bun scripts/lint/no-circular-deps.ts
      - name: Check for duplicate/catalog dependencies
        run: bun scripts/lint/no-duplicate-deps.ts
      - name: Check package.json ordering
        run: bun scripts/format/sort-package-json.ts --check
