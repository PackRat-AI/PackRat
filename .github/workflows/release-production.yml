name: Release Production Builds

on:
  push:
    branches:
      - main
    paths:
      - 'apps/expo/**'
      - 'packages/**'
      - '.github/workflows/release-production.yml'
  workflow_dispatch:

concurrency:
  group: release-production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-ios:
    name: Build iOS Production
    runs-on: macos-14
    timeout-minutes: 90
    # Only run on the main repository (not forks) and when merging from release/* branches
    if: |
      github.repository == 'PackRat-AI/PackRat' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' &&
        startsWith(github.event.head_commit.message, 'Merge pull request') &&
        contains(github.event.head_commit.message, 'release/')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS production app locally
        id: build-ios
        run: |
          cd apps/expo
          echo "Starting local iOS build..."
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output build-output.ipa
          
          # Verify the build output exists
          if [ ! -f "build-output.ipa" ]; then
            echo "::error::iOS build artifact not found"
            exit 1
          fi
          
          echo "iOS build completed successfully"
          ls -lh build-output.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-production-build
          path: apps/expo/build-output.ipa
          retention-days: 30

  build-android:
    name: Build Android Production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Only run on the main repository (not forks) and when merging from release/* branches
    if: |
      github.repository == 'PackRat-AI/PackRat' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' &&
        startsWith(github.event.head_commit.message, 'Merge pull request') &&
        contains(github.event.head_commit.message, 'release/')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android production app locally
        id: build-android
        run: |
          cd apps/expo
          echo "Starting local Android build..."
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output build-output.aab
          
          # Verify the build output exists
          if [ ! -f "build-output.aab" ]; then
            echo "::error::Android build artifact not found"
            exit 1
          fi
          
          echo "Android build completed successfully"
          ls -lh build-output.aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-production-build
          path: apps/expo/build-output.aab
          retention-days: 30

  submit:
    name: Submit to Stores
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-production-build
          path: ./ios-artifact

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-production-build
          path: ./android-artifact

      - name: Submit iOS to App Store
        id: submit-ios
        run: |
          cd apps/expo
          eas submit \
            --platform ios \
            --path ${{ github.workspace }}/ios-artifact/build-output.ipa \
            --profile production \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
        continue-on-error: true

      - name: Submit Android to Play Store
        id: submit-android
        run: |
          cd apps/expo
          eas submit \
            --platform android \
            --path ${{ github.workspace }}/android-artifact/build-output.aab \
            --profile production \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Check submission results
        run: |
          IOS_STATUS="${{ steps.submit-ios.outcome }}"
          ANDROID_STATUS="${{ steps.submit-android.outcome }}"
          
          echo "iOS submission: $IOS_STATUS"
          echo "Android submission: $ANDROID_STATUS"
          
          # Count successes
          SUCCESS_COUNT=0
          if [ "$IOS_STATUS" = "success" ]; then
            SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          fi
          if [ "$ANDROID_STATUS" = "success" ]; then
            SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          fi
          
          # Report based on outcomes
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "::error::Both iOS and Android submissions failed or were skipped"
            exit 1
          elif [ $SUCCESS_COUNT -eq 1 ]; then
            if [ "$IOS_STATUS" = "success" ]; then
              echo "::warning::Android submission did not succeed (status: $ANDROID_STATUS), but iOS succeeded"
            else
              echo "::warning::iOS submission did not succeed (status: $IOS_STATUS), but Android succeeded"
            fi
          else
            echo "::notice::Both platforms submitted successfully"
          fi

      - name: Report deployment status
        if: always()
        run: |
          {
            echo "## Production Deployment Summary"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Author:** ${{ github.actor }}"
            echo ""
            echo "### Build Status"
            echo "- **iOS:** Built locally on macOS runner"
            echo "- **Android:** Built locally on Linux runner with Docker"
            echo ""
            echo "### Submission Status"
            echo "- **iOS:** ${{ steps.submit-ios.outcome }}"
            echo "- **Android:** ${{ steps.submit-android.outcome }}"
            echo ""
            echo "### Store Links"
            echo "- [App Store](https://apps.apple.com/app/id6499243187)"
            echo "- [Google Play](https://play.google.com/store/apps/details?id=com.packratai.mobile)"
          } >> "$GITHUB_STEP_SUMMARY"
