name: API Tests

on:
  push:
    branches: ["main", "development"]
    paths:
      - "packages/api/**"
  pull_request:
    branches: ["**"]
    paths:
      - "packages/api/**"

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: packrat_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d packrat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Run database migrations
        run: bun run --cwd packages/api db:migrate

      - name: Run API tests
        run: bun run --cwd packages/api test
