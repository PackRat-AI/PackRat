name: API Tests

on:
  push:
    branches: ["main", "development"]
    paths:
      - "packages/api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "packages/api/**"
      - ".github/workflows/api-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Verify docker and pool-workers version
        run: |
          docker version || echo "docker missing"
          echo "--- pool-workers ---"
          cat node_modules/@cloudflare/vitest-pool-workers/package.json 2>/dev/null | grep -E '"version"' || echo "not installed at root"
          echo "--- vitest ---"
          cat node_modules/vitest/package.json 2>/dev/null | grep -E '"version"' || echo "not installed"

      - name: Run API tests
        run: bun run --cwd packages/api test 2>&1 | tee /tmp/api-tests-output.log

      - name: Post api-tests output on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('/tmp/api-tests-output.log', 'utf8'); } catch {}
            const body = [
              '### api-tests output (last 150 lines)',
              '```',
              log.split('\n').slice(-150).join('\n'),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
