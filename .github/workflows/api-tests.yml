name: API Tests

on:
  push:
    branches: ["main", "development"]
    paths:
      - "packages/api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "packages/api/**"
      - ".github/workflows/api-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Run API tests
        run: bun run --cwd packages/api test 2>&1 | tee /tmp/api-tests-output.log

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-tests-output
          path: /tmp/api-tests-output.log
          if-no-files-found: ignore
