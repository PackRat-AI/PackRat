name: Checks

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      fix:
        description: 'Apply Biome autofixes (runs bun lint and commits changes)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Required for optional workflow_dispatch autofix commits.
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - name: Run Biome (check mode)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fix == true) }}
        run: bun biome check
      - name: Run Biome (autofix mode)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.fix == true }}
        run: bun lint
      - name: Commit Biome autofixes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.fix == true }}
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'chore: apply biome autofixes via checks workflow'
      - name: Check circular dependencies
        run: bun scripts/lint/no-circular-deps.ts
      - name: Check for duplicate/catalog dependencies
        run: bun scripts/lint/no-duplicate-deps.ts
      - name: Check fat-table queries are explicitly projected
        run: bun scripts/lint/no-unprojected-fat-table-queries.ts
      - name: Check package.json ordering
        run: bun scripts/format/sort-package-json.ts --check
      - name: Custom lint rules (typeof guards, raw regex, process.env)
        run: bun lint:custom
      - name: Check for unauthenticated routes
        run: bun scripts/lint/no-unauth-routes.ts
      - name: Check unsafe type casts
        run: bun check:casts:strict
      # Two type-check passes, deliberately. `bun check-types` runs a single
      # root `tsc` over the shared React-Native/web/node program (jsx:
      # react-native, lib DOM+ESNext). That program structurally CANNOT house
      # packages with a different global type environment — Cloudflare Workers
      # packages (packages/mcp: @cloudflare/workers-types, no DOM) and the
      # @kitajs/html JSX package (packages/consent-ui: global JSX namespace) —
      # so those, plus osm-db/osm-import/overpass, are excluded from the root
      # tsconfig. `bun check-types:packages` (turbo) then type-checks EVERY
      # package under its OWN tsconfig, closing that gap. Both must stay: the
      # root pass catches cross-package program errors, the turbo pass catches
      # per-package errors the root program can't see (e.g. MCP, #2533).
      - name: Check types (root tsc — shared RN/web/node program)
        run: bun check-types
      - name: Check types (per-package — turbo, each tsconfig)
        run: bun check-types:packages
      - name: Run Expo Doctor
        run: bunx expo-doctor
        working-directory: apps/expo
        continue-on-error: true
      - name: Run React Doctor checks
        run: bun check:react-doctor
        continue-on-error: true
