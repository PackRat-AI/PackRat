name: Release iOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (example: v2.0.20). Defaults to the selected ref.'
        required: false
        type: string

concurrency:
  group: release-ios-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-ios:
    name: Release iOS App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: release_tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::No release tag provided."
            exit 1
          fi

          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$TAG' must follow v<semver> format (for example v2.0.20)."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true

      - name: Validate release tag and app versions
        run: bun .github/scripts/validate-release-version.ts "${{ steps.release_tag.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          body: |
            ## PackRat iOS Release
            Version `${{ steps.release_tag.outputs.version }}` was submitted to App Store Connect.

            Download on the App Store: https://apps.apple.com/app/id6499243187
