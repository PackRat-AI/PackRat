name: Check Types

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install
      - name: Check Types
        id: tsc
        continue-on-error: true
        run: bun check-types 2>&1 | tee /tmp/tsc.txt; exit ${PIPESTATUS[0]}
      - name: Post errors
        if: steps.tsc.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('/tmp/tsc.txt', 'utf8').slice(0, 4000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### check-types output\n```\n' + out + '\n```'
            });
      - name: Fail if tsc failed
        if: steps.tsc.outcome == 'failure'
        run: exit 1
