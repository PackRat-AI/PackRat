name: Check Types

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install
      - name: Check Types
        run: |
          bun check-types 2>&1 | tee /tmp/tsc-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -200 /tmp/tsc-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Now fail if tsc failed
          bun check-types
