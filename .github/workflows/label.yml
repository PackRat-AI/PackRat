name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-pr:
    name: Label pull request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-issue:
    name: Label new issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = [];

            if (body.includes('bug') || body.includes('error') || body.includes('crash') || body.includes('broken')) {
              labels.push('bug');
            }
            if (body.includes('feature') || body.includes('enhancement') || body.includes('request')) {
              labels.push('enhancement');
            }
            if (body.includes('documentation') || body.includes('docs') || body.includes('readme')) {
              labels.push('documentation');
            }
            if (body.includes('mobile') || body.includes('expo') || body.includes('react native') || body.includes('android') || body.includes('ios')) {
              labels.push('mobile');
            }
            if (body.includes('api') || body.includes('backend') || body.includes('server') || body.includes('database')) {
              labels.push('api');
            }
            if (body.includes('web') || body.includes('landing') || body.includes('guides') || body.includes('next.js')) {
              labels.push('web');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
            }
