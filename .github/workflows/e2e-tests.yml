name: E2E Tests (Maestro)

on:
  push:
    branches: [main, development]
    paths:
      - "apps/expo/**"
      - ".maestro/**"
      - ".github/workflows/e2e-tests.yml"
  # Note: Using `pull_request` (not `pull_request_target`) so forked PRs get
  # CI feedback on their own code.  Secrets are unavailable for forks, so
  # the job is skipped via the `if` condition on the job below.
  pull_request:
    branches: [main, development]
    paths:
      - "apps/expo/**"
      - ".maestro/**"
      - ".github/workflows/e2e-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAESTRO_VERSION: 2.3.0

jobs:
  ios-e2e:
    name: iOS E2E Tests
    runs-on: macos-15
    timeout-minutes: 120
    # Skip on forked PRs — secrets are not available in forks
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Check E2E secrets
        id: secrets-check
        run: |
          if [ -z "${TEST_EMAIL:-}" ] || [ -z "${TEST_PASSWORD:-}" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E_TEST_EMAIL/E2E_TEST_PASSWORD not set — build will run but Maestro step will be skipped."
            echo "::warning::Set them via: gh secret set E2E_TEST_EMAIL --repo PackRat-AI/PackRat && gh secret set E2E_TEST_PASSWORD --repo PackRat-AI/PackRat"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build iOS app for simulator
        run: |
          cd apps/expo
          mkdir -p build
          eas build \
            --platform ios \
            --profile e2e \
            --non-interactive \
            --local \
            --output ./build/PackRat-sim.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}

      - name: Cache Maestro CLI
        id: maestro-cache
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ env.MAESTRO_VERSION }}-${{ runner.os }}

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          export MAESTRO_VERSION="${{ env.MAESTRO_VERSION }}"
          curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Extract iOS simulator build
        run: |
          mkdir -p apps/expo/build/extracted
          tar -xzf apps/expo/build/PackRat-sim.tar.gz -C apps/expo/build/extracted
          APP_PATH=$(find apps/expo/build/extracted -name "*.app" -maxdepth 3 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in simulator build archive"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Boot iOS Simulator
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: |
          # Pick the newest available iOS runtime on this runner. GitHub's
          # macOS images ship different iOS runtimes over time; hard-coding a
          # specific major version breaks CI every time Apple ships a new one.
          IOS_RUNTIME=$(xcrun simctl list runtimes --json \
            | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          runtimes = [r for r in data.get('runtimes', [])
                      if r.get('isAvailable', False) and 'iOS' in r.get('name','')]
          if not runtimes:
              print('::error::No available iOS runtimes found on this runner', file=sys.stderr)
              sys.exit(1)
          def ver_key(r):
              m = re.search(r'iOS\s+(\d+)(?:\.(\d+))?', r.get('name',''))
              return (int(m.group(1)) if m else 0, int(m.group(2) or 0) if m else 0)
          runtimes.sort(key=ver_key)
          picked = runtimes[-1]
          print(f\"Picked runtime: {picked['name']}\", file=sys.stderr)
          print(picked['identifier'])
          ")

          # Prefer a plain iPhone (no Pro/Plus/Max) from a recent generation.
          # Fall back through 17 -> 16 -> 15 -> any available plain iPhone so
          # the workflow survives device-type churn on the runner images.
          DEVICE_TYPE=$(xcrun simctl list devicetypes --json \
            | python3 -c "
          import sys, json, re
          types = json.load(sys.stdin)['devicetypes']
          def plain_iphone(name):
              return ('iPhone' in name
                      and 'Pro' not in name
                      and 'Plus' not in name
                      and 'Max' not in name
                      and 'mini' not in name
                      and 'SE' not in name)
          plain = [d for d in types if plain_iphone(d.get('name',''))]
          if not plain:
              print('::error::No plain iPhone device types found on this runner', file=sys.stderr)
              sys.exit(1)
          def gen(d):
              m = re.search(r'iPhone\s+(\d+)', d.get('name',''))
              return int(m.group(1)) if m else 0
          # Prefer generations 15/16/17 (current sweet spot), then fall back
          # to whatever plain iPhone is newest.
          preferred = [d for d in plain if gen(d) in (17, 16, 15)]
          pool = preferred if preferred else plain
          pool.sort(key=gen, reverse=True)
          picked = pool[0]
          print(f\"Picked device type: {picked['name']}\", file=sys.stderr)
          print(picked['identifier'])
          ")

          echo "Using runtime: $IOS_RUNTIME"
          echo "Using device type: $DEVICE_TYPE"
          DEVICE_ID=$(xcrun simctl create "PackRat-E2E" "$DEVICE_TYPE" "$IOS_RUNTIME")
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "SIMULATOR_UDID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Install app on simulator
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: |
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Run Maestro E2E tests
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: |
          mkdir -p test-results
          bun test:e2e:ios --device "$SIMULATOR_UDID" --format junit --output test-results/maestro-results.xml
        env:
          TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          TRIP_NAME: E2E-Trip-${{ github.run_id }}
          PACK_NAME: E2E-Pack-${{ github.run_id }}
          APP_ID: com.andrewbierman.packrat

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-results
          path: test-results/
          retention-days: 30

      - name: Upload Maestro screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-failure-artifacts
          path: ~/.maestro/tests/
          retention-days: 7

      - name: Shutdown simulator
        if: always() && steps.secrets-check.outputs.has_secrets == 'true'
        run: |
          xcrun simctl shutdown "${SIMULATOR_UDID:-}" || true
          xcrun simctl delete "${SIMULATOR_UDID:-}" || true

  android-e2e:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Skip on forked PRs — secrets are not available in forks
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Check E2E secrets
        id: secrets-check
        run: |
          if [ -z "${TEST_EMAIL:-}" ] || [ -z "${TEST_PASSWORD:-}" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E_TEST_EMAIL/E2E_TEST_PASSWORD not set — build will run but Maestro step will be skipped."
            echo "::warning::Set them via: gh secret set E2E_TEST_EMAIL --repo PackRat-AI/PackRat && gh secret set E2E_TEST_PASSWORD --repo PackRat-AI/PackRat"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space on runner
        # Gradle builds of this RN app fail with OOM / no-space on stock
        # ubuntu-latest. Prune large preinstalled toolchains we don't use.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY/Ruby" "$AGENT_TOOLSDIRECTORY/Python" \
            "$AGENT_TOOLSDIRECTORY/PyPy" "$AGENT_TOOLSDIRECTORY/go" || true
          sudo apt-get -y autoremove --purge '^llvm-.*' '^mongodb-.*' \
            '^mysql-.*' 'azure-cli' 'google-cloud-cli' 'google-chrome-stable' \
            'firefox' 'powershell' 'temurin-*-jdk' 2>/dev/null || true
          sudo apt-get -y autoremove || true
          sudo apt-get -y clean || true
          docker image prune -af || true
          df -h

      - name: Configure swap for Gradle
        # R8/ProGuard during :app:packageRelease regularly OOMs on 16GB
        # runners without swap. Add a generous swap file.
        run: |
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Maestro CLI
        id: maestro-cache-android
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ env.MAESTRO_VERSION }}-${{ runner.os }}

      - name: Install Maestro CLI
        if: steps.maestro-cache-android.outputs.cache-hit != 'true'
        run: |
          export MAESTRO_VERSION="${{ env.MAESTRO_VERSION }}"
          curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Build Android APK for emulator
        run: |
          cd apps/expo
          mkdir -p build
          eas build \
            --platform android \
            --profile e2e \
            --non-interactive \
            --local \
            --output ./build/PackRat.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}

      - name: Enable KVM for hardware acceleration
        if: steps.secrets-check.outputs.has_secrets == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        if: steps.secrets-check.outputs.has_secrets == 'true'
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-${{ runner.os }}

      - name: Create AVD and generate snapshot for caching
        if: steps.secrets-check.outputs.has_secrets == 'true' && steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: PackRat-E2E
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run Maestro E2E tests on Android emulator
        if: steps.secrets-check.outputs.has_secrets == 'true'
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: PackRat-E2E
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            mkdir -p test-results
            adb shell pm disable-user com.android.launcher3 || true
            adb shell pm disable-user com.google.android.apps.nexuslauncher || true
            adb install apps/expo/build/PackRat.apk
            cp .maestro/config.yaml .maestro/config.yaml.bak
            cp .maestro/config-android.yaml .maestro/config.yaml
            maestro test \
              --format junit \
              --output test-results/maestro-results.xml \
              .maestro/
            mv .maestro/config.yaml.bak .maestro/config.yaml
        env:
          TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          TRIP_NAME: E2E-Trip-${{ github.run_id }}
          PACK_NAME: E2E-Pack-${{ github.run_id }}
          APP_ID: com.packratai.mobile

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-results
          path: test-results/
          retention-days: 30

      - name: Upload Maestro screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-failure-artifacts
          path: ~/.maestro/tests/
          retention-days: 7
