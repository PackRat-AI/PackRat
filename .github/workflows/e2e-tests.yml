name: E2E Tests (Maestro)

on:
  push:
    branches: [main, development]
    paths:
      - "apps/expo/**"
      - "!apps/expo/**/__tests__/**"
      - "!apps/expo/**/*.test.ts"
      - "!apps/expo/**/*.test.tsx"
      - "!apps/expo/vitest.config.ts"
      - ".maestro/**"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    branches: [main, development]
    paths:
      - "apps/expo/**"
      - "!apps/expo/**/__tests__/**"
      - "!apps/expo/**/*.test.ts"
      - "!apps/expo/**/*.test.tsx"
      - "!apps/expo/vitest.config.ts"
      - ".maestro/**"
      - ".github/workflows/e2e-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAESTRO_VERSION: 2.3.0
  MAESTRO_CLI_NO_ANALYTICS: "true"
  # Local Postgres used by both jobs — no cloud DB dependency.
  E2E_DB_URL: postgres://e2e_user:e2e_pass@localhost:5432/packrat_e2e
  E2E_API_URL: http://localhost:8787

jobs:
  e2e-gate:
    name: Check E2E prerequisites
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        name: Verify E2E secrets are available
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          # NEON_DEV_DATABASE_URL no longer required — both jobs run a local
          # Postgres instance via ikalnytskyi/action-setup-postgres.
          # E2E_BETTER_AUTH_SECRET is the only crypto secret wrangler dev needs.
          E2E_BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET }}
        run: |
          if [ -n "$E2E_TEST_EMAIL" ] && [ -n "$E2E_BETTER_AUTH_SECRET" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E secrets not configured — skipping E2E tests (need E2E_TEST_EMAIL + E2E_BETTER_AUTH_SECRET)"
          fi

  ios-e2e:
    name: iOS E2E Tests
    needs: e2e-gate
    if: needs.e2e-gate.outputs.ready == 'true'
    runs-on: macos-15
    timeout-minutes: 120

    env:
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Add node_modules bin to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> $GITHUB_PATH

      # ── Local API stack ────────────────────────────────────────────────────

      - name: Start local Postgres with pgvector
        run: |
          set -euo pipefail
          # postgresql@14 is pre-installed on macos-15; @16 requires a 35s download.
          PG_VER=14
          BREW_PREFIX="$(brew --prefix)"
          PG_BIN="${BREW_PREFIX}/opt/postgresql@${PG_VER}/bin"
          PG_DATA="$HOME/pgdata-e2e"

          # Stop any running postgres service so port 5432 is free.
          brew services stop "postgresql@${PG_VER}" 2>/dev/null || true
          brew services stop postgresql@16 2>/dev/null || true

          # Ensure postgresql@14 is installed. If pg_config exists but was compiled
          # against an older macOS SDK (common on macos-15 runners where pg14 ships
          # pre-installed from a prior image build), reinstall to get a fresh bottle.
          if ! "$PG_BIN/pg_config" --version > /dev/null 2>&1; then
            echo "postgresql@${PG_VER} not found — installing..."
            brew install "postgresql@${PG_VER}"
          else
            # Check if the embedded SDK path in pg_config's CFLAGS still exists.
            # If not, the pre-installed pg14 was compiled against a stale SDK and
            # we need a fresh bottle compiled for the current macOS version.
            PGCFLAGS="$("$PG_BIN/pg_config" --cflags 2>&1 || echo '')"
            STALE_SDK="$(echo "$PGCFLAGS" | grep -oE -- '-isysroot [^[:space:]]+' | awk '{print $2}' || true)"
            if [ -n "$STALE_SDK" ] && [ ! -d "$STALE_SDK" ]; then
              echo "pg14 compiled against stale SDK $STALE_SDK — reinstalling..."
              brew reinstall "postgresql@${PG_VER}"
            fi
          fi
          echo "Using: $("$PG_BIN/pg_config" --version)"
          echo "pg_config CFLAGS: $("$PG_BIN/pg_config" --cflags)"

          # Build pgvector from source against this PG version's pg_config.
          # Pin to a known-good tag so the build is reproducible.
          # Pass the current Xcode SDK explicitly so make doesn't use any stale
          # -isysroot path that may remain in pg_config's CFLAGS after reinstall.
          git clone --depth 1 --branch v0.8.0 \
            https://github.com/pgvector/pgvector.git /tmp/pgvector-build
          CURRENT_SDK="$(xcrun --show-sdk-path)"
          echo "Building pgvector with SDK: ${CURRENT_SDK}"
          make -C /tmp/pgvector-build \
            PG_CONFIG="$PG_BIN/pg_config" \
            PG_CFLAGS="-isysroot ${CURRENT_SDK}" || {
            echo "::error::pgvector make failed. pg_config CFLAGS:"
            "$PG_BIN/pg_config" --cflags || true
            exit 1
          }
          make -C /tmp/pgvector-build install PG_CONFIG="$PG_BIN/pg_config"
          echo "pgvector installed"

          "$PG_BIN/initdb" -D "$PG_DATA" --encoding=UTF8 --auth=trust
          printf '\nport = 5432\nlisten_addresses = '"'"'127.0.0.1'"'"'\n' \
            >> "$PG_DATA/postgresql.conf"
          "$PG_BIN/pg_ctl" -D "$PG_DATA" -l "$HOME/pg.log" start

          READY=false
          for i in $(seq 1 30); do
            if "$PG_BIN/pg_isready" -h 127.0.0.1 -p 5432 > /dev/null 2>&1; then
              READY=true
              break
            fi
            sleep 2
          done
          if [ "$READY" != "true" ]; then
            echo "::error::PostgreSQL did not become ready"
            cat "$HOME/pg.log"
            exit 1
          fi

          "$PG_BIN/psql" -h 127.0.0.1 -p 5432 -U "$(whoami)" postgres \
            -c "CREATE USER e2e_user WITH PASSWORD 'e2e_pass';"
          "$PG_BIN/psql" -h 127.0.0.1 -p 5432 -U "$(whoami)" postgres \
            -c "CREATE DATABASE packrat_e2e OWNER e2e_user;"
          echo "Database ready."

      - name: Write wrangler .dev.vars
        env:
          E2E_BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET }}
          # Optional: real weather keys improve trip-detail test fidelity.
          # Fall back to schema-valid stubs — weather errors are non-fatal.
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: |
          # Write static (non-secret) vars first via heredoc.
          # Schema-valid stubs are used for APIs not exercised by the master flow
          # (AI, email, R2, social OAuth) so env-validation does not throw.
          cat > packages/api/.dev.vars << 'DEVVARS'
          NEON_DATABASE_URL=postgres://e2e_user:e2e_pass@localhost:5432/packrat_e2e
          NEON_DATABASE_URL_READONLY=postgres://e2e_user:e2e_pass@localhost:5432/packrat_e2e
          BETTER_AUTH_URL=http://localhost:8787
          EXPO_PUBLIC_API_URL=http://localhost:8787
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=gobuffs
          PACKRAT_API_KEY=secret
          EMAIL_PROVIDER=resend
          RESEND_API_KEY=re_e2e_stub_not_used_in_maestro_flows
          EMAIL_FROM=no-reply@e2e.packrattest.local
          AI_PROVIDER=openai
          OPENAI_API_KEY=sk-e2e-stub-not-used-in-maestro-master-flow
          GOOGLE_GENERATIVE_AI_API_KEY=e2e-stub-not-used
          PERPLEXITY_API_KEY=pplx-e2e-stub-not-used-in-maestro-master-flow
          GOOGLE_CLIENT_ID=e2e-google-client-id
          GOOGLE_CLIENT_SECRET=e2e-google-client-secret
          APPLE_CLIENT_ID=com.packratai.e2e
          APPLE_PRIVATE_KEY=e2e-apple-private-key-stub
          APPLE_KEY_ID=E2EAPLKEY1
          APPLE_TEAM_ID=E2ETEAMID1
          CLOUDFLARE_ACCOUNT_ID=e2eaccountid
          CLOUDFLARE_AI_GATEWAY_ID=ai-chat-gateway
          R2_ACCESS_KEY_ID=e2er2accesskey
          R2_SECRET_ACCESS_KEY=e2er2secretkey1234567890abcdefghij
          PACKRAT_BUCKET_R2_BUCKET_NAME=packrat-bucket-e2e
          PACKRAT_GUIDES_BUCKET_R2_BUCKET_NAME=packrat-guides-e2e
          PACKRAT_SCRAPY_BUCKET_R2_BUCKET_NAME=packrat-scrapy-e2e
          R2_PUBLIC_URL=https://pub-e2estub.r2.dev
          PACKRAT_GUIDES_RAG_NAME=packrat-guides-rag
          PACKRAT_GUIDES_BASE_URL=https://guides.packratai.com/
          DEVVARS

          # Inject secrets separately (printf avoids shell expansion on special chars).
          printf 'BETTER_AUTH_SECRET=%s\n' "${E2E_BETTER_AUTH_SECRET}" \
            >> packages/api/.dev.vars
          printf 'WEATHER_API_KEY=%s\n' \
            "${WEATHER_API_KEY:-e2e-fake-weather-key}" \
            >> packages/api/.dev.vars
          printf 'OPENWEATHER_KEY=%s\n' \
            "${OPENWEATHER_KEY:-e2e-fake-weather-key}" \
            >> packages/api/.dev.vars

      - name: Run DB migrations
        run: |
          NEON_DATABASE_URL="${{ env.E2E_DB_URL }}" \
            bun run --filter @packrat/api db:migrate

      - name: Seed E2E test user
        run: |
          NEON_DATABASE_URL="${{ env.E2E_DB_URL }}" \
          E2E_TEST_EMAIL="${{ env.TEST_EMAIL }}" \
          E2E_TEST_PASSWORD="${{ env.TEST_PASSWORD }}" \
            bun run --filter @packrat/api db:seed:e2e-user

      - name: Start wrangler dev (background)
        working-directory: packages/api
        run: |
          # Use the E2E-specific config which strips the containers/durable_objects
          # bindings — Docker image builds block wrangler startup on CI runners.
          WRANGLER_LOG=info \
          WRANGLER_SEND_METRICS=false \
            wrangler dev --config wrangler-e2e.jsonc --ip 0.0.0.0 --port 8787 \
              > /tmp/wrangler-dev.log 2>&1 &
          WRANGLER_PID=$!
          echo "WRANGLER_PID=${WRANGLER_PID}" >> "$GITHUB_ENV"

          # Fail fast if wrangler crashes at startup (TypeScript error, bad config, etc.)
          sleep 5
          if ! kill -0 "${WRANGLER_PID}" 2>/dev/null; then
            echo "::error::wrangler dev exited immediately — showing log:"
            cat /tmp/wrangler-dev.log
            exit 1
          fi

          echo "Waiting for API to be ready on ${{ env.E2E_API_URL }}/health ..."
          RETRIES=60
          until curl -sf "${{ env.E2E_API_URL }}/health" > /dev/null; do
            RETRIES=$((RETRIES - 1))
            if [ "$RETRIES" -le 0 ]; then
              echo "::error::wrangler dev did not become ready in time"
              cat /tmp/wrangler-dev.log
              exit 1
            fi
            sleep 2
          done
          echo "API ready."

      # ── iOS build ──────────────────────────────────────────────────────────

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('apps/expo/package.json', 'apps/expo/app.config.ts', 'bun.lock') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      - name: Cache iOS simulator build
        id: ios-build-cache
        uses: actions/cache@v4
        with:
          path: apps/expo/build/PackRat-sim.tar.gz
          # 'local-api' suffix keeps this cache slot separate from any builds
          # that embedded the deployed API URL.
          key: ios-sim-${{ runner.os }}-local-api-${{ hashFiles('apps/expo/**', 'packages/**', 'bun.lock') }}
          restore-keys: |
            ios-sim-${{ runner.os }}-local-api-

      - name: Pin API URL to local wrangler dev
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        run: |
          # .env.local has highest priority in Expo's env hierarchy and
          # overrides whatever EXPO_PUBLIC_API_URL the EAS 'preview' environment
          # injects during the local build.
          echo "EXPO_PUBLIC_API_URL=${{ env.E2E_API_URL }}" > apps/expo/.env.local

      - name: Build iOS app for simulator
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        run: |
          cd apps/expo
          mkdir -p build
          eas build \
            --platform ios \
            --profile e2e \
            --non-interactive \
            --local \
            --output ./build/PackRat-sim.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}

      # ── Maestro ────────────────────────────────────────────────────────────

      - name: Cache Maestro CLI
        id: maestro-cache
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ env.MAESTRO_VERSION }}-${{ runner.os }}

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          export MAESTRO_VERSION="${{ env.MAESTRO_VERSION }}"
          curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Extract iOS simulator build
        run: |
          mkdir -p apps/expo/build/extracted
          tar -xzf apps/expo/build/PackRat-sim.tar.gz -C apps/expo/build/extracted
          APP_PATH=$(find apps/expo/build/extracted -name "*.app" -maxdepth 3 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in simulator build archive"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Boot iOS Simulator
        run: |
          IOS_RUNTIME=$(xcrun simctl list runtimes --json \
            | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          runtimes = [r for r in data.get('runtimes', [])
                      if r.get('isAvailable', False) and 'iOS' in r.get('name','')]
          if not runtimes:
              print('::error::No available iOS runtimes found on this runner', file=sys.stderr)
              sys.exit(1)
          def ver_key(r):
              m = re.search(r'iOS\s+(\d+)(?:\.(\d+))?', r.get('name',''))
              return (int(m.group(1)) if m else 0, int(m.group(2) or 0) if m else 0)
          runtimes.sort(key=ver_key)
          picked = runtimes[-1]
          print(f\"Picked runtime: {picked['name']}\", file=sys.stderr)
          print(picked['identifier'])
          ")

          DEVICE_TYPE=$(xcrun simctl list devicetypes --json \
            | python3 -c "
          import sys, json, re
          types = json.load(sys.stdin)['devicetypes']
          def plain_iphone(name):
              return ('iPhone' in name
                      and 'Pro' not in name
                      and 'Plus' not in name
                      and 'Max' not in name
                      and 'mini' not in name
                      and 'SE' not in name)
          plain = [d for d in types if plain_iphone(d.get('name',''))]
          if not plain:
              print('::error::No plain iPhone device types found on this runner', file=sys.stderr)
              sys.exit(1)
          def gen(d):
              m = re.search(r'iPhone\s+(\d+)', d.get('name',''))
              return int(m.group(1)) if m else 0
          preferred = [d for d in plain if gen(d) in (17, 16, 15)]
          pool = preferred if preferred else plain
          pool.sort(key=gen, reverse=True)
          picked = pool[0]
          print(f\"Picked device type: {picked['name']}\", file=sys.stderr)
          print(picked['identifier'])
          ")

          echo "Using runtime: $IOS_RUNTIME"
          echo "Using device type: $DEVICE_TYPE"
          DEVICE_ID=$(xcrun simctl create "PackRat-E2E" "$DEVICE_TYPE" "$IOS_RUNTIME")
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "SIMULATOR_UDID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Install app on simulator
        run: |
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Run Maestro E2E tests
        run: |
          mkdir -p test-results
          bun test:e2e:ios --device "$SIMULATOR_UDID" --format junit --output test-results/maestro-results.xml
        env:
          TEST_EMAIL: ${{ env.TEST_EMAIL }}
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TRIP_NAME: E2E-Trip-${{ github.run_id }}
          PACK_NAME: E2E-Pack-${{ github.run_id }}
          APP_ID: com.andrewbierman.packrat.preview
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "600000"

      # ── Artifacts & cleanup ────────────────────────────────────────────────

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-results
          path: test-results/
          retention-days: 30

      - name: Upload Maestro screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-failure-artifacts
          path: ~/.maestro/tests/
          retention-days: 7

      - name: Upload wrangler dev log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-wrangler-dev-log
          path: /tmp/wrangler-dev.log
          retention-days: 7

      - name: Stop wrangler dev
        if: always()
        run: kill "${WRANGLER_PID:-}" 2>/dev/null || true

      - name: Shutdown simulator
        if: always()
        run: |
          xcrun simctl shutdown "${SIMULATOR_UDID:-}" || true
          xcrun simctl delete "${SIMULATOR_UDID:-}" || true

  android-e2e:
    name: Android E2E Tests
    needs: e2e-gate
    if: needs.e2e-gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: e2e_user
          POSTGRES_PASSWORD: e2e_pass
          POSTGRES_DB: packrat_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY/Ruby" "$AGENT_TOOLSDIRECTORY/PyPy" || true
          sudo apt-get -y autoremove --purge '^llvm-.*' '^mongodb-.*' \
            '^mysql-.*' 'azure-cli' 'google-cloud-cli' 'google-chrome-stable' \
            'firefox' 'powershell' 2>/dev/null || true
          sudo apt-get -y autoremove || true
          sudo apt-get -y clean || true
          docker image prune -af || true
          df -h

      - name: Configure swap for Gradle
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile-ci
          sudo dd if=/dev/zero of=/mnt/swapfile-ci bs=1M count=10240 status=none
          sudo chmod 600 /mnt/swapfile-ci
          sudo mkswap /mnt/swapfile-ci
          sudo swapon /mnt/swapfile-ci
          free -h

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        env:
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Add node_modules bin to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> $GITHUB_PATH

      # ── Local API stack ────────────────────────────────────────────────────
      # Postgres with pgvector runs as a job-level service container (see services: above).

      - name: Write wrangler .dev.vars
        env:
          E2E_BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: |
          cat > packages/api/.dev.vars << 'DEVVARS'
          NEON_DATABASE_URL=postgres://e2e_user:e2e_pass@localhost:5432/packrat_e2e
          NEON_DATABASE_URL_READONLY=postgres://e2e_user:e2e_pass@localhost:5432/packrat_e2e
          BETTER_AUTH_URL=http://localhost:8787
          EXPO_PUBLIC_API_URL=http://localhost:8787
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=gobuffs
          PACKRAT_API_KEY=secret
          EMAIL_PROVIDER=resend
          RESEND_API_KEY=re_e2e_stub_not_used_in_maestro_flows
          EMAIL_FROM=no-reply@e2e.packrattest.local
          AI_PROVIDER=openai
          OPENAI_API_KEY=sk-e2e-stub-not-used-in-maestro-master-flow
          GOOGLE_GENERATIVE_AI_API_KEY=e2e-stub-not-used
          PERPLEXITY_API_KEY=pplx-e2e-stub-not-used-in-maestro-master-flow
          GOOGLE_CLIENT_ID=e2e-google-client-id
          GOOGLE_CLIENT_SECRET=e2e-google-client-secret
          APPLE_CLIENT_ID=com.packratai.e2e
          APPLE_PRIVATE_KEY=e2e-apple-private-key-stub
          APPLE_KEY_ID=E2EAPLKEY1
          APPLE_TEAM_ID=E2ETEAMID1
          CLOUDFLARE_ACCOUNT_ID=e2eaccountid
          CLOUDFLARE_AI_GATEWAY_ID=ai-chat-gateway
          R2_ACCESS_KEY_ID=e2er2accesskey
          R2_SECRET_ACCESS_KEY=e2er2secretkey1234567890abcdefghij
          PACKRAT_BUCKET_R2_BUCKET_NAME=packrat-bucket-e2e
          PACKRAT_GUIDES_BUCKET_R2_BUCKET_NAME=packrat-guides-e2e
          PACKRAT_SCRAPY_BUCKET_R2_BUCKET_NAME=packrat-scrapy-e2e
          R2_PUBLIC_URL=https://pub-e2estub.r2.dev
          PACKRAT_GUIDES_RAG_NAME=packrat-guides-rag
          PACKRAT_GUIDES_BASE_URL=https://guides.packratai.com/
          DEVVARS

          printf 'BETTER_AUTH_SECRET=%s\n' "${E2E_BETTER_AUTH_SECRET}" \
            >> packages/api/.dev.vars
          printf 'WEATHER_API_KEY=%s\n' \
            "${WEATHER_API_KEY:-e2e-fake-weather-key}" \
            >> packages/api/.dev.vars
          printf 'OPENWEATHER_KEY=%s\n' \
            "${OPENWEATHER_KEY:-e2e-fake-weather-key}" \
            >> packages/api/.dev.vars

      - name: Run DB migrations
        run: |
          NEON_DATABASE_URL="${{ env.E2E_DB_URL }}" \
            bun run --filter @packrat/api db:migrate

      - name: Seed E2E test user
        run: |
          NEON_DATABASE_URL="${{ env.E2E_DB_URL }}" \
          E2E_TEST_EMAIL="${{ env.TEST_EMAIL }}" \
          E2E_TEST_PASSWORD="${{ env.TEST_PASSWORD }}" \
            bun run --filter @packrat/api db:seed:e2e-user

      - name: Start wrangler dev (background)
        working-directory: packages/api
        run: |
          # Use the E2E-specific config which strips the containers/durable_objects
          # bindings — Docker image builds block wrangler startup on CI runners.
          # --ip 0.0.0.0 is required: Android emulator reaches the host via
          # 10.0.2.2; wrangler must listen on all interfaces to accept it.
          WRANGLER_LOG=info \
          WRANGLER_SEND_METRICS=false \
            wrangler dev --config wrangler-e2e.jsonc --ip 0.0.0.0 --port 8787 \
              > /tmp/wrangler-dev.log 2>&1 &
          WRANGLER_PID=$!
          echo "WRANGLER_PID=${WRANGLER_PID}" >> "$GITHUB_ENV"

          # Fail fast if wrangler crashes at startup (TypeScript error, bad config, etc.)
          sleep 5
          if ! kill -0 "${WRANGLER_PID}" 2>/dev/null; then
            echo "::error::wrangler dev exited immediately — showing log:"
            cat /tmp/wrangler-dev.log
            exit 1
          fi

          echo "Waiting for API to be ready on ${{ env.E2E_API_URL }}/health ..."
          RETRIES=60
          until curl -sf "${{ env.E2E_API_URL }}/health" > /dev/null; do
            RETRIES=$((RETRIES - 1))
            if [ "$RETRIES" -le 0 ]; then
              echo "::error::wrangler dev did not become ready in time"
              cat /tmp/wrangler-dev.log
              exit 1
            fi
            sleep 2
          done
          echo "API ready."

      # ── Android build ──────────────────────────────────────────────────────

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android APK build
        id: android-build-cache
        uses: actions/cache@v4
        with:
          path: apps/expo/build/PackRat.apk
          # Separate cache slot from non-local-api builds.
          key: android-apk-${{ runner.os }}-local-api-${{ hashFiles('apps/expo/**', 'packages/**', 'bun.lock') }}
          restore-keys: |
            android-apk-${{ runner.os }}-local-api-

      - name: Pin API URL to local wrangler dev
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: |
          # getApiUrl() replaces 'localhost' with '10.0.2.2' at runtime on Android.
          echo "EXPO_PUBLIC_API_URL=${{ env.E2E_API_URL }}" > apps/expo/.env.local

      - name: Build Android APK for emulator
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: |
          cd apps/expo
          mkdir -p build
          eas build \
            --platform android \
            --profile e2e \
            --non-interactive \
            --local \
            --output ./build/PackRat.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}

      # ── Maestro ────────────────────────────────────────────────────────────

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-${{ runner.os }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: PackRat-E2E
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Cache Maestro CLI
        id: maestro-cache-android
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ env.MAESTRO_VERSION }}-${{ runner.os }}

      - name: Install Maestro CLI
        if: steps.maestro-cache-android.outputs.cache-hit != 'true'
        run: |
          export MAESTRO_VERSION="${{ env.MAESTRO_VERSION }}"
          curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Run Maestro E2E tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: PackRat-E2E
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            mkdir -p test-results
            adb shell pm disable-user com.android.launcher3 || true
            adb shell pm disable-user com.google.android.apps.nexuslauncher || true
            adb install apps/expo/build/PackRat.apk
            sleep 10
            adb shell input keyevent KEYCODE_BACK 2>/dev/null || true
            adb shell input keyevent KEYCODE_BACK 2>/dev/null || true
            bash .github/scripts/e2e.sh android --format junit --output test-results/maestro-results.xml
        env:
          TEST_EMAIL: ${{ env.TEST_EMAIL }}
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TRIP_NAME: E2E-Trip-${{ github.run_id }}
          PACK_NAME: E2E-Pack-${{ github.run_id }}
          APP_ID: com.packratai.mobile.preview

      # ── Artifacts & cleanup ────────────────────────────────────────────────

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-results
          path: test-results/
          retention-days: 30

      - name: Upload Maestro screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-failure-artifacts
          path: ~/.maestro/tests/
          retention-days: 7

      - name: Upload wrangler dev log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-wrangler-dev-log
          path: /tmp/wrangler-dev.log
          retention-days: 7

      - name: Stop wrangler dev
        if: always()
        run: kill "${WRANGLER_PID:-}" 2>/dev/null || true
