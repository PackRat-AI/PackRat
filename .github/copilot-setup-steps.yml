steps:
  - name: Install Bun
    run: |
      curl -fsSL https://bun.sh/install | bash
      echo "$HOME/.bun/bin" >> $GITHUB_PATH

  - name: Install dependencies
    run: bun install --frozen-lockfile
    env:
      PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN: ${{ secrets.PACKRAT_NATIVEWIND_UI_GITHUB_TOKEN }}
