name: Feature Request
description: Suggest a new feature or improvement for PackRat
title: '[Feature]: '
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill in as much detail as you can.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app would this feature affect?
      options:
        - Mobile app (Expo / React Native)
        - API / Backend
        - Landing page
        - Guides site
        - CI / CD
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Is your feature request related to a problem? Please describe it.
      placeholder: I'm always frustrated when…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request here.

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched for existing issues and this is not a duplicate.
          required: true
        - label: I have read the contributing guidelines.
          required: true
