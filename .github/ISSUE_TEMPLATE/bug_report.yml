name: Bug Report
description: Report a bug or unexpected behavior in PackRat
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you experiencing this bug on?
      multiple: true
      options:
        - iOS (Mobile App)
        - Android (Mobile App)
        - Web (packratai.com)
        - Guides (guides.packratai.com)
        - API
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App / Browser Version
      description: e.g. "1.2.3" for mobile, or browser name + version for web
      placeholder: e.g. 1.2.3 or Chrome 123

  - type: input
    id: device
    attributes:
      label: Device / OS
      description: e.g. iPhone 15 Pro (iOS 17.4), Samsung Galaxy S24 (Android 14)
      placeholder: e.g. iPhone 15 Pro (iOS 17.4)

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Tap / click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or console output.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - "Critical — app crash or data loss"
        - "High — major feature is broken with no workaround"
        - "Medium — feature is degraded but a workaround exists"
        - "Low — minor issue or cosmetic defect"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recordings
      description: If applicable, add screenshots or recordings to help explain the problem. You can drag and drop files here.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g. network conditions, account type, specific data that triggers the bug).
