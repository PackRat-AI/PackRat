id: no-index-zero
language: typescript
# warning, not error: under the repo's `noUncheckedIndexedAccess`, `arr[0]` is
# already typed `T | undefined` (type-safe), so this is a STYLE nudge toward
# `first()` from @packrat/utils — never a safety fix. Burn the backlog down; do
# not gate CI on it.
severity: warning
message: "Avoid raw numeric index access (`arr[0]`, `arr[1]`, …). Use `first(arr)` / `last(arr)` from @packrat/utils for ends, or native `arr.at(n)` for an arbitrary index (both `T | undefined` under noUncheckedIndexedAccess — same safety, clearer intent). Genuine tuple/fixed-shape access (e.g. a `[lat, lng]` tuple, a regex match group) is fine — annotate with `// allow-index:` and ignore this nudge."
ignores:
  # Mirrors no-raw-typeof / no-primitive-cast scope: utils is the canonical home
  # of `first`/`last`, guards is the narrow home, tooling dirs and non-production
  # files are out of scope.
  - "**/packages/guards/**"
  - "**/packages/utils/**"
  - "scripts/**"
  - ".github/**"
  - "**/mocks/**"
  - "**/__mocks__/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
rule:
  # A simple element access `$ARR[$IDX]` where `$ARR` is a bare IDENTIFIER and
  # `$IDX` is a numeric literal (`0`, `1`, `2`, …). The constraints keep it narrow:
  # `has: {field: object, kind: identifier}` does NOT match
  #   - `getThing()[0]`      (object is a call_expression)
  #   - `a.b.c[0]`           (object is a member_expression)
  #   - `re.match(s)[1]`     (object is a call_expression)
  #   - `Object.entries(x)[0]` (object is a call_expression)
  # and `IDX kind: number` excludes computed/variable indices `arr[i]` / `arr[k+1]`.
  # Tuple-typed identifiers can't be detected statically, so some noise on those
  # is accepted (warning, not error).
  pattern: $ARR[$IDX]
  has:
    field: object
    kind: identifier
constraints:
  IDX:
    kind: number
