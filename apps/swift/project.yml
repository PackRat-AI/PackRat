name: PackRat

options:
  bundleIdPrefix: com.andrewbierman
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Staging: release
  Release: release

configFiles:
  Debug: xcconfig/Config-Debug.xcconfig
  Staging: xcconfig/Config-Staging.xcconfig
  Release: xcconfig/Config-Release.xcconfig

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "13.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  OpenAPIRuntime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.5.0"
  OpenAPIURLSession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.0.0"
  HTTPTypes:
    url: https://github.com/apple/swift-http-types
    from: "1.0.0"
  Algorithms:
    url: https://github.com/apple/swift-algorithms
    from: "1.2.0"
  Collections:
    url: https://github.com/apple/swift-collections
    from: "1.1.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"

targets:
  PackRat-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/PackRat
      - Sources/PackRatShared
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: Resources/PackRat-iOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: Resources/Info-iOS.plist
      properties:
        CFBundleDisplayName: $(PACKRAT_DISPLAY_NAME)
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "2.0.29"
        CFBundleVersion: "2026071601"
        LSRequiresIPhoneOS: true
        # All four orientations are required for iPad (device family "1,2");
        # App Store validation (error 90474) rejects the bundle otherwise.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSLocationWhenInUseUsageDescription: "This app needs access to your location while you are using it."
        NSCameraUsageDescription: "This app requires access to your camera to let you take photos or scan items."
        NSPhotoLibraryUsageDescription: "This app needs access to your photo library to let you upload or choose photos."
        ITSAppUsesNonExemptEncryption: false
        PACKRAT_ENV: $(PACKRAT_ENV)
        SENTRY_DSN: $(SENTRY_DSN)
        GOOGLE_IOS_CLIENT_ID: 993694750638-97t0vhfml04u2avrlbve22jbs9qcinbc.apps.googleusercontent.com
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          # Primary deep-link scheme — matches Expo's `scheme: 'packrat'` in app.config.ts
          # so deep links survive an iOS-to-Swift swap without re-issuing existing universal
          # links / partner-shared URLs.
          - CFBundleURLName: world.packrat.deeplinks
            CFBundleURLSchemes:
              - packrat
          # Reverse-DNS scheme retained for Google Sign-In OAuth callback parity with Expo.
          - CFBundleURLName: world.packrat.oauth
            CFBundleURLSchemes:
              - com.andrewbierman.packrat
          - CFBundleURLName: world.packrat.google
            CFBundleURLSchemes:
              - com.googleusercontent.apps.993694750638-97t0vhfml04u2avrlbve22jbs9qcinbc
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: MarkdownUI
        product: MarkdownUI
      - package: OpenAPIRuntime
        product: OpenAPIRuntime
      - package: OpenAPIURLSession
        product: OpenAPIURLSession
      - package: HTTPTypes
        product: HTTPTypes
      - package: Algorithms
        product: Algorithms
      - package: Collections
        product: Collections
      - package: Defaults
        product: Defaults
      - package: Sentry
        product: Sentry
      - package: GoogleSignIn
        product: GoogleSignIn
      - target: PackRat-Watch
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Watch
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "2.0.29"
        CURRENT_PROJECT_VERSION: "2026071601"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 666HGMV2LU
        PACKRAT_IOS_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.swift
        PRODUCT_BUNDLE_IDENTIFIER: $(PACKRAT_IOS_BUNDLE_IDENTIFIER)
        PACKRAT_COMPANION_BUNDLE_IDENTIFIER: $(PACKRAT_IOS_BUNDLE_IDENTIFIER)
        PACKRAT_WATCH_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.swift.watchkitapp
        PACKRAT_DISPLAY_NAME: PackRat Swift
        PRODUCT_MODULE_NAME: PackRat
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PackRat-Watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Sources/PackRatWatch
      - Sources/PackRatShared
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/WatchAssets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Resources/Info-watchOS.plist
      properties:
        CFBundleDisplayName: $(PACKRAT_DISPLAY_NAME)
        CFBundleIconName: WatchAppIcon
        CFBundleShortVersionString: "2.0.29"
        CFBundleVersion: "2026071601"
        WKApplication: true
        WKCompanionAppBundleIdentifier: $(PACKRAT_COMPANION_BUNDLE_IDENTIFIER)
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "2.0.29"
        CURRENT_PROJECT_VERSION: "2026071601"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 666HGMV2LU
        PACKRAT_WATCH_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.swift.watchkitapp
        PRODUCT_BUNDLE_IDENTIFIER: $(PACKRAT_WATCH_BUNDLE_IDENTIFIER)
        PACKRAT_COMPANION_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.swift
        PACKRAT_DISPLAY_NAME: PackRat Swift
        PRODUCT_MODULE_NAME: PackRatWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon

  PackRat-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/PackRat
      - Sources/PackRatShared
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: Resources/PackRat-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: YES
        com.apple.security.network.client: YES
    info:
      path: Resources/Info-macOS.plist
      properties:
        CFBundleDisplayName: $(PACKRAT_DISPLAY_NAME)
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "2.0.29"
        CFBundleVersion: "2026071601"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        PACKRAT_ENV: $(PACKRAT_ENV)
        SENTRY_DSN: $(SENTRY_DSN)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: MarkdownUI
        product: MarkdownUI
      - package: OpenAPIRuntime
        product: OpenAPIRuntime
      - package: OpenAPIURLSession
        product: OpenAPIURLSession
      - package: HTTPTypes
        product: HTTPTypes
      - package: Algorithms
        product: Algorithms
      - package: Collections
        product: Collections
      - package: Defaults
        product: Defaults
      - package: Sentry
        product: Sentry
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "2.0.29"
        CURRENT_PROJECT_VERSION: "2026071601"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.mac
        PACKRAT_DISPLAY_NAME: PackRat Swift
        # Match iOS target so @testable import PackRat resolves on both platforms.
        PRODUCT_MODULE_NAME: PackRat
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PackRatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PackRatTests
    dependencies:
      - target: PackRat-iOS
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  PackRatUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/PackRatUITests
    dependencies:
      - target: PackRat-iOS
    # Static Info.plist (xcodegen-rendered from `info.properties`) instead of
    # GENERATE_INFOPLIST_FILE. xcodebuild substitutes $(PACKRAT_E2E_*) build
    # settings into the file at build time; the values arrive via the xcodebuild
    # CLI from run-e2e.ts. INFOPLIST_KEY_* silently drops non-Apple-defined
    # keys, which is why this target uses a static plist instead.
    info:
      path: Tests/PackRatUITests/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        E2E_API_BASE_URL: $(E2E_API_BASE_URL)
        PACKRAT_E2E_EMAIL: $(PACKRAT_E2E_EMAIL)
        PACKRAT_E2E_PASSWORD: $(PACKRAT_E2E_PASSWORD)
        PACKRAT_E2E_SESSION_TOKEN: $(PACKRAT_E2E_SESSION_TOKEN)
        PACKRAT_E2E_USER_ID: $(PACKRAT_E2E_USER_ID)
        PACKRAT_E2E_ALLOW_LOGIN_SEED: $(PACKRAT_E2E_ALLOW_LOGIN_SEED)
        PACKRAT_SCREENSHOT_DIR: $(PACKRAT_SCREENSHOT_DIR)
        PACKRAT_VISUAL_AUTH_MODE: $(PACKRAT_VISUAL_AUTH_MODE)
        PACKRAT_VISUAL_PLATFORM: $(PACKRAT_VISUAL_PLATFORM)
    settings:
      base:
        SWIFT_VERSION: "5.9"
        E2E_API_BASE_URL: ""
        PACKRAT_E2E_EMAIL: ""
        PACKRAT_E2E_PASSWORD: ""
        PACKRAT_E2E_SESSION_TOKEN: ""
        PACKRAT_E2E_USER_ID: ""
        PACKRAT_E2E_ALLOW_LOGIN_SEED: ""
        PACKRAT_SCREENSHOT_DIR: ""
        PACKRAT_VISUAL_AUTH_MODE: ""
        PACKRAT_VISUAL_PLATFORM: ""

  PackRatMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PackRatTests
    dependencies:
      - target: PackRat-macOS
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  PackRatMacOSUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/PackRatUITests
    dependencies:
      - target: PackRat-macOS
    # Same static-plist + build-setting-substitution pattern as PackRatUITests.
    info:
      path: Tests/PackRatMacOSUITests/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        E2E_API_BASE_URL: $(E2E_API_BASE_URL)
        PACKRAT_E2E_EMAIL: $(PACKRAT_E2E_EMAIL)
        PACKRAT_E2E_PASSWORD: $(PACKRAT_E2E_PASSWORD)
        PACKRAT_E2E_SESSION_TOKEN: $(PACKRAT_E2E_SESSION_TOKEN)
        PACKRAT_E2E_USER_ID: $(PACKRAT_E2E_USER_ID)
        PACKRAT_E2E_ALLOW_LOGIN_SEED: $(PACKRAT_E2E_ALLOW_LOGIN_SEED)
        PACKRAT_SCREENSHOT_DIR: $(PACKRAT_SCREENSHOT_DIR)
        PACKRAT_VISUAL_AUTH_MODE: $(PACKRAT_VISUAL_AUTH_MODE)
        PACKRAT_VISUAL_PLATFORM: $(PACKRAT_VISUAL_PLATFORM)
    settings:
      base:
        SWIFT_VERSION: "5.9"
        E2E_API_BASE_URL: ""
        PACKRAT_E2E_EMAIL: ""
        PACKRAT_E2E_PASSWORD: ""
        PACKRAT_E2E_SESSION_TOKEN: ""
        PACKRAT_E2E_USER_ID: ""
        PACKRAT_E2E_ALLOW_LOGIN_SEED: ""
        PACKRAT_SCREENSHOT_DIR: ""
        PACKRAT_VISUAL_AUTH_MODE: ""
        PACKRAT_VISUAL_PLATFORM: ""

schemes:
  PackRat-iOS:
    build:
      targets:
        PackRat-iOS: all
        PackRatTests: [test]
        PackRatUITests: [test]
    test:
      testPlans:
        - path: TestPlans/iOS-Full.xctestplan
          defaultPlan: true
        - path: TestPlans/iOS-Smoke.xctestplan
      targets:
        - PackRatTests
        - PackRatUITests
    run:
      config: Debug
    archive:
      config: Release
  # Ad-hoc QA distribution scheme — archives the Staging config (→ dev API).
  # Built by .github/workflows/swift-staging-adhoc.yml and exported ad-hoc.
  PackRat-iOS-Staging:
    build:
      targets:
        PackRat-iOS: all
    run:
      config: Staging
    archive:
      config: Staging
  PackRat-macOS:
    build:
      targets:
        PackRat-macOS: all
        PackRatMacOSTests: [test]
        PackRatMacOSUITests: [test]
    test:
      testPlans:
        - path: TestPlans/macOS-Full.xctestplan
          defaultPlan: true
        - path: TestPlans/macOS-Smoke.xctestplan
      targets:
        - PackRatMacOSTests
        - PackRatMacOSUITests
    run:
      config: Debug
    archive:
      config: Release
  PackRat-Watch:
    build:
      targets:
        PackRat-Watch: all
    run:
      config: Debug
    archive:
      config: Release
