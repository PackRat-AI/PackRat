name: PackRat

options:
  bundleIdPrefix: com.andrewbierman
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: xcconfig/Config-Debug.xcconfig
  Release: xcconfig/Config-Release.xcconfig

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  OpenAPIRuntime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.5.0"
  OpenAPIURLSession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.0.0"
  HTTPTypes:
    url: https://github.com/apple/swift-http-types
    from: "1.0.0"
  Algorithms:
    url: https://github.com/apple/swift-algorithms
    from: "1.2.0"
  Collections:
    url: https://github.com/apple/swift-collections
    from: "1.1.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.0"

targets:
  PackRat-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/PackRat
    resources:
      - Resources/Assets.xcassets
    entitlements:
      path: Resources/PackRat-iOS.entitlements
      properties: {}
    info:
      path: Resources/Info-iOS.plist
      properties:
        CFBundleDisplayName: PackRat
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSLocationWhenInUseUsageDescription: "This app needs access to your location while you are using it."
        ITSAppUsesNonExemptEncryption: false
        PACKRAT_ENV: $(PACKRAT_ENV)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.andrewbierman.packrat
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: MarkdownUI
        product: MarkdownUI
      - package: OpenAPIRuntime
        product: OpenAPIRuntime
      - package: OpenAPIURLSession
        product: OpenAPIURLSession
      - package: HTTPTypes
        product: HTTPTypes
      - package: Algorithms
        product: Algorithms
      - package: Collections
        product: Collections
      - package: Defaults
        product: Defaults
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7WV9JYCW55
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewbierman.packrat
        PRODUCT_MODULE_NAME: PackRat

  PackRat-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/PackRat
    resources:
      - Resources/Assets.xcassets
    entitlements:
      path: Resources/PackRat-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: YES
        com.apple.security.network.client: YES
    info:
      path: Resources/Info-macOS.plist
      properties:
        CFBundleDisplayName: PackRat
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        PACKRAT_ENV: $(PACKRAT_ENV)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: MarkdownUI
        product: MarkdownUI
      - package: OpenAPIRuntime
        product: OpenAPIRuntime
      - package: OpenAPIURLSession
        product: OpenAPIURLSession
      - package: HTTPTypes
        product: HTTPTypes
      - package: Algorithms
        product: Algorithms
      - package: Collections
        product: Collections
      - package: Defaults
        product: Defaults
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7WV9JYCW55
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.mac

  PackRatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PackRatTests
    dependencies:
      - target: PackRat-iOS
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PackRat-iOS:
    build:
      targets:
        PackRat-iOS: all
        PackRatTests: [test]
    test:
      targets:
        - PackRatTests
    run:
      config: Debug
    archive:
      config: Release
  PackRat-macOS:
    build:
      targets:
        PackRat-macOS: all
    run:
      config: Debug
    archive:
      config: Release
