name: PackRat

options:
  bundleIdPrefix: com.andrewbierman
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  OpenAPIRuntime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.5.0"
  PackRat:
    # Local Package.swift — provides the PackRatAPIClient target with the
    # swift-openapi-generator build plugin. Nuke and MarkdownUI are declared
    # above as remote packages so they live in the Xcode project's package graph.
    path: "."

targets:
  PackRat-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/PackRat
    resources:
      - Resources/Assets.xcassets
    entitlements:
      path: Resources/PackRat-iOS.entitlements
      properties: {}
    info:
      path: Resources/Info-iOS.plist
      properties:
        CFBundleDisplayName: PackRat
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSLocationWhenInUseUsageDescription: "This app needs access to your location while you are using it."
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.andrewbierman.packrat
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: MarkdownUI
        product: MarkdownUI
      - package: OpenAPIRuntime
        product: OpenAPIRuntime
      - package: PackRat
        product: PackRatAPIClient
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewbierman.packrat

  PackRat-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/PackRat
    resources:
      - Resources/Assets.xcassets
    entitlements:
      path: Resources/PackRat-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: YES
        com.apple.security.network.client: YES
    info:
      path: Resources/Info-macOS.plist
      properties:
        CFBundleDisplayName: PackRat
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: MarkdownUI
        product: MarkdownUI
      - package: OpenAPIRuntime
        product: OpenAPIRuntime
      - package: PackRat
        product: PackRatAPIClient
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewbierman.packrat.mac

  PackRatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PackRatTests
    dependencies:
      - target: PackRat-iOS
    settings:
      base:
        SWIFT_VERSION: "5.9"
